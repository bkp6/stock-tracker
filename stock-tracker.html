<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="存股追蹤">
<title>存股追蹤器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #000000;
    --bg2: #1c1c1e;
    --bg3: #2c2c2e;
    --bg4: #3a3a3c;
    --text: #ffffff;
    --text2: #ebebf5cc;
    --text3: #8e8e93;
    --text4: #48484a;
    --blue: #0a84ff;
    --green: #30d158;
    --red: #ff453a;
    --yellow: #ffd60a;
    --purple: #bf5af2;
    --border: #38383a;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { background: var(--bg); color: var(--text); font-family: 'Noto Sans TC', -apple-system, sans-serif; min-height: 100%; overflow-x: hidden; }
  ::-webkit-scrollbar { display: none; }
  input, select, textarea { background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 13px 14px; border-radius: 10px; font-family: inherit; font-size: 16px; width: 100%; outline: none; -webkit-appearance: none; appearance: none; }
  input:focus { border-color: var(--blue); }
  input::placeholder { color: var(--text4); }
  input[type="date"] { color-scheme: dark; }
  button { cursor: pointer; font-family: inherit; border: none; -webkit-appearance: none; }
  .mono { font-variant-numeric: tabular-nums; }
  /* Cards */
  .card { background: var(--bg2); border-radius: 16px; padding: 16px; margin-bottom: 12px; }
  .card2 { background: var(--bg3); border-radius: 12px; padding: 14px; margin-bottom: 8px; }
  /* Buttons */
  .btn { border-radius: 12px; padding: 14px 0; font-size: 16px; font-weight: 600; width: 100%; transition: opacity .15s; }
  .btn:active { opacity: .6; }
  .btn-blue { background: var(--blue); color: #fff; }
  .btn-red { background: var(--red); color: #fff; }
  .btn-gray { background: var(--bg3); color: var(--text); }
  .btn-sm { border-radius: 8px; padding: 7px 13px; font-size: 13px; font-weight: 600; transition: opacity .15s; }
  .btn-sm:active { opacity: .6; }
  /* Layout */
  .row { display: flex; align-items: center; justify-content: space-between; }
  .label { font-size: 13px; color: var(--text3); margin-bottom: 7px; }
  .section-title { font-size: 12px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .6px; margin: 20px 0 10px; }
  .divider { height: 1px; background: var(--border); margin: 10px 0; }
  .chip { background: var(--bg3); border-radius: 8px; padding: 3px 9px; font-size: 12px; color: var(--text3); display: inline-block; }
  .pill { border-radius: 20px; padding: 3px 10px; font-size: 11px; font-weight: 700; display: inline-block; }
  /* Nav */
  #nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(28,28,30,.97); border-top: 1px solid var(--border); display: flex; padding: 8px 0; padding-bottom: calc(8px + env(safe-area-inset-bottom, 0px)); z-index: 100; }
  .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; background: none; border: none; color: var(--text3); font-size: 10px; font-family: inherit; padding: 4px 0; transition: color .15s; }
  .nav-btn.active { color: var(--blue); }
  .nav-icon { font-size: 22px; line-height: 1; }
  /* Pages — top padding set by JS after measuring header */
  #app { padding-left: 16px; padding-right: 16px; padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 90px); max-width: 430px; margin: 0 auto; padding-top: 100px; }
  .page { display: none; }
  .page.active { display: block; animation: fadeIn .2s ease; }
  /* Header */
  #header { position: fixed; top: 0; left: 0; right: 0; padding: calc(env(safe-area-inset-top, 44px) + 10px) 20px 12px; background: rgba(0,0,0,.97); z-index: 50; }
  /* Modal — use visibility trick instead of transform to avoid iOS Safari fixed bug */
  #modal-wrap { position: fixed; inset: 0; z-index: 200; }
  #overlay { position: absolute; inset: 0; background: rgba(0,0,0,.65); }
  #sheet { position: absolute; bottom: 0; left: 0; right: 0; background: var(--bg2); border-radius: 20px 20px 0 0; padding: 20px 20px; padding-bottom: calc(28px + env(safe-area-inset-bottom, 0px)); max-height: 88vh; overflow-y: auto; animation: slideUp .28s ease; }
  /* Animations */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  /* PnL colors */
  .pos { color: var(--green) !important; }
  .neg { color: var(--red) !important; }
  .zer { color: var(--text3) !important; }
  /* Grid */
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .grid4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
  /* Misc */
  .empty { text-align: center; padding: 50px 0; color: var(--text4); }
  .empty-icon { font-size: 44px; margin-bottom: 12px; }
  .stat-box { }
  .stat-box .stat-label { font-size: 11px; color: var(--text3); margin-bottom: 3px; }
  .stat-box .stat-val { font-size: 13px; font-weight: 600; }
  .spin { display: inline-block; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  /* Toast */
  #toast { position: fixed; top: calc(var(--safe-top) + 70px); left: 50%; transform: translateX(-50%); background: var(--bg3); color: var(--text); padding: 10px 20px; border-radius: 20px; font-size: 14px; z-index: 300; display: none; white-space: nowrap; border: 1px solid var(--border); }
</style>
</head>
<body>

<!-- Header -->
<div id="header">
  <div style="font-size:24px;font-weight:900;letter-spacing:-0.5px">存股追蹤</div>
  <div id="header-date" style="font-size:12px;color:var(--text3);margin-top:2px"></div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- App -->
<div id="app">

  <!-- DASHBOARD -->
  <div class="page active" id="page-dashboard">
    <div class="card" id="summary-card" style="background:linear-gradient(135deg,#0a84ff18,#30d15818);border:1px solid #0a84ff33">
      <div style="font-size:13px;color:var(--text3);margin-bottom:4px">持股市值</div>
      <div class="mono" id="total-mkt" style="font-size:38px;font-weight:900">$0</div>
      <div style="display:flex;gap:20px;margin-top:10px;flex-wrap:wrap">
        <div><div style="font-size:11px;color:var(--text3)">總成本</div><div class="mono" id="total-cost-d" style="font-weight:700">$0</div></div>
        <div><div style="font-size:11px;color:var(--text3)">未實現損益</div><div class="mono" id="unreal-pnl" style="font-weight:700">$0</div></div>
        <div><div style="font-size:11px;color:var(--text3)">已實現損益</div><div class="mono" id="real-pnl" style="font-weight:700">$0</div></div>
      </div>
    </div>
    <div class="grid2" style="margin-bottom:12px">
      <div class="card" style="background:#30d15818;border:1px solid #30d15833;margin-bottom:0">
        <div style="font-size:11px;color:var(--text3);margin-bottom:4px" id="this-month-label">本月股息</div>
        <div class="mono" id="div-this" style="font-size:22px;font-weight:800;color:var(--green)">$0</div>
      </div>
      <div class="card" style="background:#0a84ff18;border:1px solid #0a84ff33;margin-bottom:0">
        <div style="font-size:11px;color:var(--text3);margin-bottom:4px" id="next-month-label">下月股息</div>
        <div class="mono" id="div-next" style="font-size:22px;font-weight:800;color:var(--blue)">$0</div>
      </div>
      <div class="card" style="background:#ffd60a18;border:1px solid #ffd60a33;margin-bottom:0">
        <div style="font-size:11px;color:var(--text3);margin-bottom:4px">年度預估股息</div>
        <div class="mono" id="div-year" style="font-size:22px;font-weight:800;color:var(--yellow)">$0</div>
      </div>
      <div class="card" style="background:#bf5af218;border:1px solid #bf5af233;margin-bottom:0">
        <div style="font-size:11px;color:var(--text3);margin-bottom:4px">累計收到股息</div>
        <div class="mono" id="div-received" style="font-size:22px;font-weight:800;color:var(--purple)">$0</div>
      </div>
    </div>
    <div class="card">
      <div class="row">
        <div>
          <div style="font-weight:700;font-size:15px">即時股價查詢</div>
          <div id="ai-msg" style="font-size:12px;color:var(--text3);margin-top:2px">查詢 Yahoo Finance 即時股價</div>
        </div>
        <button class="btn btn-blue" onclick="queryAI()" id="ai-btn" style="width:72px;padding:10px 0;font-size:14px;border-radius:10px">查詢</button>
      </div>
      <div id="ai-updated" style="font-size:11px;color:var(--text4);margin-top:8px;display:none"></div>
    </div>
    <div class="card" style="border:1px solid var(--border)">
      <div style="font-weight:700;font-size:15px;margin-bottom:6px">📲 每日提醒</div>
      <div style="font-size:13px;color:var(--text3);line-height:1.6">台股收盤（13:35）後提醒你按查詢<br><span style="color:var(--yellow)">詳細設定方法見「說明」頁 →</span></div>
    </div>
    <div class="section-title">持股快覽</div>
    <div id="dashboard-holdings"></div>
  </div>

  <!-- HOLDINGS -->
  <div class="page" id="page-holdings">
    <div class="row" style="margin-bottom:16px">
      <div style="font-size:22px;font-weight:900">我的持股</div>
      <button class="btn-sm btn-blue" onclick="openModal('addHolding')" style="color:#fff">＋ 新增</button>
    </div>
    <div id="holdings-list"></div>
  </div>

  <!-- DIVIDENDS -->
  <div class="page" id="page-dividends">
    <div style="font-size:22px;font-weight:900;margin-bottom:4px">股息紀錄</div>
    <div style="font-size:13px;color:var(--text3);margin-bottom:16px">累計收到 <span class="mono" id="div-total-h" style="color:var(--purple);font-weight:700">$0</span></div>
    <div class="section-title">月曆總覽</div>
    <div class="grid4" id="div-calendar" style="margin-bottom:16px"></div>
    <div class="section-title">入帳明細</div>
    <div id="div-history-list"></div>
  </div>

  <!-- SELLS -->
  <div class="page" id="page-sells">
    <div style="font-size:22px;font-weight:900;margin-bottom:4px">賣出紀錄</div>
    <div style="font-size:13px;color:var(--text3);margin-bottom:16px">已實現損益 <span class="mono" id="real-pnl-s" style="font-weight:700">$0</span></div>
    <div id="sells-list"></div>
  </div>

  <!-- GUIDE -->
  <div class="page" id="page-guide">
    <div style="font-size:22px;font-weight:900;margin-bottom:16px">說明 &amp; 設定</div>
    <div class="card">
      <div style="font-weight:800;font-size:16px;margin-bottom:12px">📲 加入 iPhone 主畫面</div>
      <div id="guide-steps-1"></div>
    </div>
    <div class="card">
      <div style="font-weight:800;font-size:16px;margin-bottom:12px">⏰ 設定每日提醒</div>
      <div id="guide-steps-2"></div>
    </div>
    <div class="card">
      <div style="font-weight:800;font-size:16px;margin-bottom:12px">📖 日常使用流程</div>
      <div id="guide-steps-3"></div>
    </div>
    <div class="card" style="background:#ff453a10;border:1px solid #ff453a33">
      <div style="font-weight:700;color:var(--red);margin-bottom:6px">⚠ 注意</div>
      <div style="font-size:13px;color:var(--text3);line-height:1.7">AI 查詢的股價與股息為估計值，僅供參考。<br>實際配息請以公司公告為準，建議手動「入帳」記錄實際收到的金額。</div>
    </div>
  </div>

</div><!-- /app -->

<!-- Nav -->
<nav id="nav">
  <button class="nav-btn active" onclick="switchTab('dashboard')" id="nav-dashboard">
    <span class="nav-icon">📊</span><span>總覽</span>
  </button>
  <button class="nav-btn" onclick="switchTab('holdings')" id="nav-holdings">
    <span class="nav-icon">💼</span><span>持股</span>
  </button>
  <button class="nav-btn" onclick="switchTab('dividends')" id="nav-dividends">
    <span class="nav-icon">💰</span><span>股息</span>
  </button>
  <button class="nav-btn" onclick="switchTab('sells')" id="nav-sells">
    <span class="nav-icon">📋</span><span>賣出</span>
  </button>
  <button class="nav-btn" onclick="switchTab('guide')" id="nav-guide">
    <span class="nav-icon">❓</span><span>說明</span>
  </button>
</nav>

<!-- Modal wrapper: single fixed container avoids iOS Safari transform/blur bug -->
<div id="modal-wrap" style="display:none;position:fixed;inset:0;z-index:200">
  <div id="overlay" onclick="closeModal()" style="position:absolute;inset:0;background:rgba(0,0,0,.65)"></div>
  <div id="sheet" style="position:absolute;bottom:0;left:0;right:0;background:var(--bg2);border-radius:20px 20px 0 0;padding:20px;padding-bottom:calc(28px + env(safe-area-inset-bottom,0px));max-height:88vh;overflow-y:auto"></div>
</div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
let state = {
  holdings: [],     // {code, name, shares, avgPrice, lots:[{shares,price,date}]}
  sells: [],        // {id, code, name, shares, sellPrice, avgCost, profit, date}
  divHistory: [],   // {id, code, name, perShare, shares, total, date}
  stockInfo: {},    // {[code]: {name, price, dividends:[{month,amount}], updatedAt}}
};
let currentModal = null;
let selectedHolding = null;

// ─── Persistence ──────────────────────────────────────────────────────────────
function save() { localStorage.setItem('stdv3', JSON.stringify(state)); }
function load() {
  try {
    const d = localStorage.getItem('stdv3');
    if (d) state = { ...state, ...JSON.parse(d) };
  } catch {}
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
const now = new Date();
const THIS_MONTH = now.getMonth() + 1;
const NEXT_MONTH = THIS_MONTH === 12 ? 1 : THIS_MONTH + 1;
const MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

function fmt(n, d=0) {
  if (isNaN(n)) return '0';
  return Number(n).toLocaleString('zh-TW', {minimumFractionDigits:d, maximumFractionDigits:d});
}
function fmtDate(iso) {
  return new Date(iso).toLocaleDateString('zh-TW', {month:'2-digit', day:'2-digit'});
}
function pnlClass(v) { return v > 0 ? 'pos' : v < 0 ? 'neg' : 'zer'; }
function pnlSign(v) { return v > 0 ? '+' : ''; }
function getPrice(code) { return state.stockInfo[code]?.price || 0; }
function getDivInMonth(h, month) {
  const info = state.stockInfo[h.code];
  if (!info?.dividends) return 0;
  const d = info.dividends.find(d => d.month === month);
  return d ? d.amount * h.shares : 0;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2500);
}

// ─── Tab switching ────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + tab).classList.add('active');
  document.getElementById('nav-' + tab).classList.add('active');
  renderAll();
}

// ─── Render ───────────────────────────────────────────────────────────────────
function renderAll() {
  renderDashboard();
  renderHoldings();
  renderDividends();
  renderSells();
  renderGuide();
}

function renderDashboard() {
  const totalCost    = state.holdings.reduce((s,h) => s + h.shares * h.avgPrice, 0);
  const totalMkt     = state.holdings.reduce((s,h) => s + h.shares * (getPrice(h.code) || h.avgPrice), 0);
  const unrealPnL    = totalMkt - totalCost;
  const realPnL      = state.sells.reduce((s,v) => s + v.profit, 0);
  const divThis      = state.holdings.reduce((s,h) => s + getDivInMonth(h, THIS_MONTH), 0);
  const divNext      = state.holdings.reduce((s,h) => s + getDivInMonth(h, NEXT_MONTH), 0);
  const divYear      = state.holdings.reduce((s,h) => s + (state.stockInfo[h.code]?.dividends||[]).reduce((ss,d) => ss + d.amount*h.shares, 0), 0);
  const divReceived  = state.divHistory.reduce((s,d) => s + d.total, 0);

  document.getElementById('total-mkt').textContent = '$' + fmt(totalMkt);
  document.getElementById('total-cost-d').textContent = '$' + fmt(totalCost);
  
  const up = document.getElementById('unreal-pnl');
  up.textContent = pnlSign(unrealPnL) + '$' + fmt(unrealPnL);
  up.className = 'mono ' + pnlClass(unrealPnL);

  const rp = document.getElementById('real-pnl');
  rp.textContent = pnlSign(realPnL) + '$' + fmt(realPnL);
  rp.className = 'mono ' + pnlClass(realPnL);

  document.getElementById('this-month-label').textContent = THIS_MONTH + '月預計股息';
  document.getElementById('next-month-label').textContent = NEXT_MONTH + '月預計股息';
  document.getElementById('div-this').textContent = '$' + fmt(divThis);
  document.getElementById('div-next').textContent = '$' + fmt(divNext);
  document.getElementById('div-year').textContent = '$' + fmt(divYear);
  document.getElementById('div-received').textContent = '$' + fmt(divReceived);

  // Mini holdings list
  const el = document.getElementById('dashboard-holdings');
  if (state.holdings.length === 0) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">💼</div>尚無持股</div>';
    return;
  }
  el.innerHTML = state.holdings.map(h => {
    const price = getPrice(h.code) || h.avgPrice;
    const pnl = (price - h.avgPrice) * h.shares;
    const pct  = ((price - h.avgPrice) / h.avgPrice * 100);
    return `<div class="card2" onclick="openHoldingDetail('${h.code}')">
      <div class="row">
        <div><span style="font-weight:700">${h.name}</span> <span class="chip">${h.code}</span></div>
        <div style="text-align:right">
          <div class="mono ${pnlClass(pnl)}" style="font-weight:700">${pnlSign(pnl)}$${fmt(pnl)}</div>
          <div class="mono ${pnlClass(pnl)}" style="font-size:12px">${pnlSign(pct)}${fmt(pct,2)}%</div>
        </div>
      </div>
      <div style="display:flex;gap:14px;margin-top:7px;font-size:12px;color:var(--text3)">
        <span>${fmt(h.shares)} 股</span>
        <span>成本 $${fmt(h.avgPrice,2)}</span>
        <span>現價 $${fmt(price,2)}</span>
      </div>
    </div>`;
  }).join('');
}

function renderHoldings() {
  const el = document.getElementById('holdings-list');
  if (state.holdings.length === 0) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">💼</div>點「新增」開始記錄</div>';
    return;
  }
  el.innerHTML = state.holdings.map(h => {
    const price   = getPrice(h.code) || h.avgPrice;
    const mktVal  = price * h.shares;
    const cost    = h.avgPrice * h.shares;
    const pnl     = mktVal - cost;
    const pct     = cost > 0 ? (pnl/cost*100) : 0;
    const divYear = (state.stockInfo[h.code]?.dividends||[]).reduce((s,d) => s + d.amount, 0);
    const yld     = cost > 0 ? (divYear * h.shares / cost * 100) : 0;
    const dm      = getDivInMonth(h, THIS_MONTH);
    return `<div class="card">
      <div class="row" style="margin-bottom:12px">
        <div><span style="font-weight:800;font-size:17px">${h.name}</span> <span class="chip" style="margin-left:4px">${h.code}</span></div>
        <div style="display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end">
          <button class="btn-sm" style="background:#0a84ff22;color:var(--blue)" onclick="openModal('addHolding','${h.code}')">加碼</button>
          <button class="btn-sm" style="background:#30d15822;color:var(--green)" onclick="openModal('addDiv','${h.code}')">入帳</button>
          <button class="btn-sm" style="background:#ff453a22;color:var(--red)" onclick="openModal('addSell','${h.code}')">賣出</button>
          <button class="btn-sm" style="background:#ff453a33;color:var(--red);border:1px solid #ff453a55" onclick="openModal('deleteHolding','${h.code}')">🗑</button>
        </div>
      </div>
      <div class="grid3">
        <div class="stat-box"><div class="stat-label">持股數</div><div class="stat-val mono">${fmt(h.shares)} 股</div></div>
        <div class="stat-box"><div class="stat-label">平均成本</div><div class="stat-val mono">$${fmt(h.avgPrice,2)}</div></div>
        <div class="stat-box"><div class="stat-label">現價</div><div class="stat-val mono">$${fmt(price,2)}</div></div>
        <div class="stat-box"><div class="stat-label">市值</div><div class="stat-val mono">$${fmt(mktVal)}</div></div>
        <div class="stat-box"><div class="stat-label">損益</div><div class="stat-val mono ${pnlClass(pnl)}">${pnlSign(pnl)}$${fmt(pnl)}</div></div>
        <div class="stat-box"><div class="stat-label">報酬率</div><div class="stat-val mono ${pnlClass(pnl)}">${pnlSign(pct)}${fmt(pct,2)}%</div></div>
      </div>
      ${yld > 0 ? `<div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap">
        <span class="pill" style="background:#30d15820;color:var(--green)">年殖利率 ${fmt(yld,2)}%</span>
        ${dm > 0 ? `<span class="pill" style="background:#0a84ff20;color:var(--blue)">${THIS_MONTH}月 +$${fmt(dm)}</span>` : ''}
      </div>` : ''}
    </div>`;
  }).join('');
}

function renderDividends() {
  const divReceived = state.divHistory.reduce((s,d) => s + d.total, 0);
  document.getElementById('div-total-h').textContent = '$' + fmt(divReceived);

  // Calendar
  const cal = document.getElementById('div-calendar');
  cal.innerHTML = MONTHS.map((m, i) => {
    const month = i + 1;
    const predicted = state.holdings.reduce((s,h) => s + getDivInMonth(h, month), 0);
    const received  = state.divHistory.filter(d => new Date(d.date).getMonth()+1 === month).reduce((s,d) => s+d.total, 0);
    const isThis = month === THIS_MONTH;
    return `<div style="background:${isThis?'#0a84ff22':'var(--bg2)'};border:1px solid ${isThis?'var(--blue)':'var(--border)'};border-radius:10px;padding:8px 5px;text-align:center">
      <div style="font-size:11px;color:var(--text3)">${m}</div>
      ${predicted > 0 ? `<div class="mono" style="font-size:11px;color:var(--green);font-weight:700">$${fmt(predicted)}</div>` : ''}
      ${received  > 0 ? `<div class="mono" style="font-size:10px;color:var(--purple)">✓$${fmt(received)}</div>` : ''}
      ${predicted===0 && received===0 ? `<div style="font-size:11px;color:var(--text4)">—</div>` : ''}
    </div>`;
  }).join('');

  // History
  const el = document.getElementById('div-history-list');
  if (state.divHistory.length === 0) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">💰</div>尚無記錄<br><span style="font-size:13px">至「持股」頁面點「入帳」</span></div>';
    return;
  }
  el.innerHTML = state.divHistory.map(d => `
    <div class="card2">
      <div class="row">
        <div><span style="font-weight:700">${d.name}</span> <span style="font-size:12px;color:var(--text3)">${d.code}</span></div>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="mono" style="font-weight:700;color:var(--purple)">+$${fmt(d.total)}</div>
          <button onclick="deleteDivHistory(${d.id})" style="background:none;border:none;color:var(--text4);font-size:18px;line-height:1;padding:0 4px">×</button>
        </div>
      </div>
      <div style="font-size:12px;color:var(--text3);margin-top:5px">${fmtDate(d.date)} · ${fmt(d.shares)}股 × $${fmt(d.perShare,3)}</div>
    </div>`).join('');
}

// ─── Modals ───────────────────────────────────────────────────────────────────
function openModal(type, code) {
  selectedHolding = code ? state.holdings.find(h => h.code === code) : null;
  currentModal = type;
  document.getElementById('modal-wrap').style.display = 'block';
  const sheet = document.getElementById('sheet');
  sheet.style.animation = 'none';
  sheet.offsetHeight; // reflow
  sheet.style.animation = 'slideUp .28s ease';

  if (type === 'addHolding')    renderAddHoldingModal();
  if (type === 'addSell')       renderAddSellModal();
  if (type === 'addDiv')        renderAddDivModal();
  if (type === 'deleteHolding') renderDeleteHoldingModal();
}

function openHoldingDetail(code) {
  selectedHolding = state.holdings.find(h => h.code === code);
  currentModal = 'holdingDetail';
  document.getElementById('modal-wrap').style.display = 'block';
  const sheet = document.getElementById('sheet');
  sheet.style.animation = 'none';
  sheet.offsetHeight;
  sheet.style.animation = 'slideUp .28s ease';
  renderHoldingDetailModal();
}

function closeModal() {
  document.getElementById('modal-wrap').style.display = 'none';
  currentModal = null;
  selectedHolding = null;
}

function renderAddHoldingModal() {
  const h = selectedHolding;
  document.getElementById('sheet').innerHTML = `
    <div style="font-weight:900;font-size:19px;margin-bottom:16px">${h ? '加碼 ' + h.name : '新增持股'}</div>
    ${!h ? `<div style="margin-bottom:14px"><div class="label">股票代號</div><input id="f-code" placeholder="例：0056、2330" style="font-size:16px"></div>` : ''}
    <div style="margin-bottom:14px"><div class="label">今日買進股數</div><input type="number" inputmode="decimal" id="f-shares" placeholder="例：1000"></div>
    <div style="margin-bottom:16px"><div class="label">今日買進價格（元／股）</div><input type="number" inputmode="decimal" id="f-price" placeholder="例：38.50"></div>
    ${h ? `<div style="font-size:12px;color:var(--text3);margin-bottom:16px;background:var(--bg3);border-radius:8px;padding:10px">
      目前：平均成本 $${fmt(h.avgPrice,2)} · ${fmt(h.shares)} 股<br>加碼後將自動攤平平均成本
    </div>` : ''}
    <button class="btn btn-blue" onclick="submitHolding()" style="margin-bottom:8px">確認新增</button>
    <button class="btn btn-gray" onclick="closeModal()">取消</button>
    ${h ? `<button class="btn btn-red" onclick="confirmDeleteHolding('${h.code}')" style="margin-top:8px">刪除此持股</button>` : ''}`;
}

function renderAddSellModal() {
  const h = selectedHolding;
  document.getElementById('sheet').innerHTML = `
    <div style="font-weight:900;font-size:19px;margin-bottom:4px">賣出 ${h.name}</div>
    <div style="font-size:13px;color:var(--text3);margin-bottom:16px">持有 ${fmt(h.shares)} 股 · 平均成本 $${fmt(h.avgPrice,2)}</div>
    <div style="margin-bottom:14px"><div class="label">賣出股數</div><input type="number" inputmode="decimal" id="f-sell-shares" placeholder="最多 ${fmt(h.shares)} 股" oninput="updateSellPreview()"></div>
    <div style="margin-bottom:14px"><div class="label">賣出價格（元／股）</div><input type="number" inputmode="decimal" id="f-sell-price" placeholder="例：42.00" oninput="updateSellPreview()"></div>
    <div id="sell-preview" style="margin-bottom:16px"></div>
    <button class="btn btn-red" onclick="submitSell()" style="margin-bottom:8px">確認賣出</button>
    <button class="btn btn-gray" onclick="closeModal()">取消</button>`;
}

function updateSellPreview() {
  const h = selectedHolding;
  const shares    = parseFloat(document.getElementById('f-sell-shares')?.value);
  const sellPrice = parseFloat(document.getElementById('f-sell-price')?.value);
  const el = document.getElementById('sell-preview');
  if (!el || isNaN(shares) || isNaN(sellPrice)) return;
  const profit = (sellPrice - h.avgPrice) * shares;
  el.innerHTML = `<div class="card2" style="text-align:center">
    <div style="font-size:12px;color:var(--text3);margin-bottom:4px">預估損益</div>
    <div class="mono ${pnlClass(profit)}" style="font-size:26px;font-weight:900">${pnlSign(profit)}$${fmt(profit)}</div>
  </div>`;
}

  const h = selectedHolding;
  const today = new Date().toISOString().slice(0,10);

    <div style="font-weight:900;font-size:19px;margin-bottom:4px">股息入帳</div>
    <div style="font-size:13px;color:var(--text3);margin-bottom:16px">${h.name} · 持有 ${fmt(h.shares)} 股</div>
    <div style="margin-bottom:14px"><div class="label">每股股息（元）</div><input type="number" inputmode="decimal" id="f-div-per" placeholder="例：0.30" oninput="updateDivPreview()"></div>

function renderDeleteHoldingModal() {

      <button class="btn btn-gray" onclick="closeModal()">取消</button>

}

function renderHoldingDetailModal() {
  const h = selectedHolding;
  document.getElementById('sheet').innerHTML = `
    <div style="font-weight:900;font-size:20px">${h.name}</div>
    <div style="font-size:13px;color:var(--text3);margin-bottom:16px">${h.code}</div>
    <div class="section-title" style="margin-top:0">買入紀錄</div>
    ${(h.lots||[]).map(l => `
      <div class="card2" style="display:flex;justify-content:space-between;align-items:center">

function confirmDeleteHolding(code) {
  const h = state.holdings.find(h => h.code === code);
  document.getElementById('sheet').innerHTML = `
    <div style="text-align:center;padding:10px 0">
      <div style="font-size:40px;margin-bottom:12px">⚠️</div>

      <div style="font-size:14px;color:var(--text3);margin-bottom:24px">持股記錄將全部清除</div>
      <button class="btn btn-red" onclick="deleteHolding('${code}')" style="margin-bottom:8px">確認刪除</button>
      <button class="btn btn-gray" onclick="openModal('addHolding','${code}')">取消</button>
    </div>`;
}

// ─── Actions ──────────────────────────────────────────────────────────────────
function submitHolding() {
  const codeEl  = document.getElementById('f-code');
  const code    = (codeEl ? codeEl.value : selectedHolding?.code)?.trim().toUpperCase();
  const shares  = parseFloat(document.getElementById('f-shares').value);
  const price   = parseFloat(document.getElementById('f-price').value);
  if (!code || isNaN(shares) || isNaN(price) || shares <= 0 || price <= 0) { showToast('請填寫所有欄位'); return; }
  const date = new Date().toISOString();
  const lot  = { shares, price, date };
  const existing = state.holdings.find(h => h.code === code);
  if (existing) {
    const newShares = existing.shares + shares;
    const newAvg    = (existing.shares * existing.avgPrice + shares * price) / newShares;
    state.holdings = state.holdings.map(h => h.code === code
      ? { ...h, shares: newShares, avgPrice: parseFloat(newAvg.toFixed(4)), lots: [...(h.lots||[]), lot] }
      : h);
  } else {
    const name = state.stockInfo[code]?.name || code;
    state.holdings.push({ code, name, shares, avgPrice: price, lots: [lot] });
  }
  save();
  closeModal();
  renderAll();
  showToast('✓ 新增完成');
}

function submitSell() {
  const h         = selectedHolding;
  const shares    = parseFloat(document.getElementById('f-sell-shares').value);
  const sellPrice = parseFloat(document.getElementById('f-sell-price').value);
  if (isNaN(shares) || isNaN(sellPrice) || shares <= 0 || shares > h.shares) { showToast('請檢查輸入值'); return; }
  const profit  = (sellPrice - h.avgPrice) * shares;
  state.sells.unshift({ id: Date.now(), code: h.code, name: h.name, shares, sellPrice, avgCost: h.avgPrice, profit, date: new Date().toISOString() });
  const newShares = h.shares - shares;
  if (newShares <= 0) state.holdings = state.holdings.filter(hh => hh.code !== h.code);
  else state.holdings = state.holdings.map(hh => hh.code === h.code ? { ...hh, shares: newShares } : hh);
  save();
  closeModal();
  renderAll();
  showToast('✓ 賣出記錄完成');
}

function submitDiv() {
  const h       = selectedHolding;
  const perShare = parseFloat(document.getElementById('f-div-per').value);
  const date    = document.getElementById('f-div-date').value;
  if (isNaN(perShare) || perShare <= 0) { showToast('請輸入每股股息'); return; }
  state.divHistory.unshift({ id: Date.now(), code: h.code, name: h.name, perShare, shares: h.shares, total: perShare * h.shares, date });
  save();
  closeModal();
  renderAll();
  showToast('✓ 股息入帳記錄完成');
}

function deleteHolding(code) {
  state.holdings = state.holdings.filter(h => h.code !== code);
  save();
  closeModal();
  renderAll();
  showToast('已刪除持股');
}

function deleteSell(id) {
  state.sells = state.sells.filter(s => s.id !== id);
  save();
  renderAll();
}

function deleteDivHistory(id) {
  state.divHistory = state.divHistory.filter(d => d.id !== id);
  save();
  renderAll();
}

// ─── Stock Price Query (Yahoo Finance via proxy) ─────────────────────────────
async function queryAI() {
  if (state.holdings.length === 0) { showToast('請先新增持股'); return; }
  const btn = document.getElementById('ai-btn');
  const msg = document.getElementById('ai-msg');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin">⟳</span>';
  msg.textContent = '查詢中...';

  // Build Yahoo Finance symbols: TW stocks need .TW suffix
  const symbols = state.holdings.map(h => {
    const c = h.code.trim();
    // ETF/stocks on TWSE: append .TW, on OTC: .TWO
    // We try .TW first; Yahoo returns null price if wrong exchange
    return c + '.TW';
  });

  let successCount = 0;
  const updatedAt = new Date().toISOString();

  // Fetch each symbol individually via allorigins proxy (avoids CORS)
  for (const sym of symbols) {
    const code = sym.replace('.TW', '');
    try {
      const url = 'https://query1.finance.yahoo.com/v8/finance/chart/' + sym + '?interval=1d&range=1d';
      const proxy = 'https://api.allorigins.win/get?url=' + encodeURIComponent(url);
      const resp = await fetch(proxy);
      const outer = await resp.json();
      const data = JSON.parse(outer.contents);
      const meta = data?.chart?.result?.[0]?.meta;
      if (meta && meta.regularMarketPrice) {
        const price = Math.round(meta.regularMarketPrice * 100) / 100;
        const name  = meta.shortName || meta.longName || code;
        // Keep existing dividends if already set; only update price + name
        const existing = state.stockInfo[code] || {};
        state.stockInfo[code] = {
          ...existing,
          name,
          price,
          updatedAt
        };
        // Also update holding name
        state.holdings = state.holdings.map(h =>
          h.code === code ? { ...h, name } : h
        );
        successCount++;
      } else {
        // Try .TWO (OTC market) if .TW returned no price
        const url2 = 'https://query1.finance.yahoo.com/v8/finance/chart/' + code + '.TWO?interval=1d&range=1d';
        const proxy2 = 'https://api.allorigins.win/get?url=' + encodeURIComponent(url2);
        const resp2 = await fetch(proxy2);
        const outer2 = await resp2.json();
        const data2 = JSON.parse(outer2.contents);
        const meta2 = data2?.chart?.result?.[0]?.meta;
        if (meta2 && meta2.regularMarketPrice) {
          const price = Math.round(meta2.regularMarketPrice * 100) / 100;
          const name  = meta2.shortName || meta2.longName || code;
          const existing = state.stockInfo[code] || {};
          state.stockInfo[code] = { ...existing, name, price, updatedAt };
          state.holdings = state.holdings.map(h => h.code === code ? { ...h, name } : h);
          successCount++;
        }
      }
    } catch(e) {
      // Skip this symbol on error
    }
  }

  save();
  renderAll();

  if (successCount > 0) {
    msg.textContent = '✓ 已更新 ' + successCount + ' 支股價 · ' + new Date().toLocaleTimeString('zh-TW');
    const upEl = document.getElementById('ai-updated');
    upEl.style.display = 'block';
    upEl.textContent = '股息請手動在持股頁面「入帳」記錄';
    showToast('✓ 股價更新完成');
  } else {
    msg.textContent = '⚠ 查詢失敗，請確認網路並重試';
    showToast('查詢失敗，請重試');
  }
  btn.disabled = false;
  btn.textContent = '查詢';
}
