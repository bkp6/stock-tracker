<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="存股追蹤">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23000'/%3E%3Ctext y='.9em' font-size='72' x='12'%3E📈%3C/text%3E%3C/svg%3E">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" id="pwa-manifest">
<title>存股追蹤器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#000;--bg2:#1c1c1e;--bg3:#2c2c2e;--bg4:#3a3a3c;
  --text:#fff;--text2:#ebebf5cc;--text3:#8e8e93;--text4:#48484a;
  --blue:#0a84ff;--green:#30d158;--red:#ff453a;--yellow:#ffd60a;--purple:#bf5af2;--orange:#ff9f0a;
  --border:#38383a;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',-apple-system,sans-serif;min-height:100%;overflow-x:hidden;}
::-webkit-scrollbar{display:none;}
input,select{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:13px 14px;border-radius:10px;font-family:inherit;font-size:16px;width:100%;outline:none;-webkit-appearance:none;appearance:none;}
input:focus{border-color:var(--blue);}
input::placeholder{color:var(--text4);}
input[type="date"]{color-scheme:dark;}
button{cursor:pointer;font-family:inherit;border:none;-webkit-appearance:none;}
.mono{font-variant-numeric:tabular-nums;}
.card{background:var(--bg2);border-radius:16px;padding:16px;margin-bottom:12px;}
.card2{background:var(--bg3);border-radius:12px;padding:14px;margin-bottom:8px;}
.btn{border-radius:12px;padding:14px 0;font-size:16px;font-weight:600;width:100%;transition:opacity .15s;border:none;}
.btn:active{opacity:.6;}
.btn-blue{background:var(--blue);color:#fff;}
.btn-red{background:var(--red);color:#fff;}
.btn-green{background:var(--green);color:#fff;}
.btn-gray{background:var(--bg3);color:var(--text);}
.btn-sm{border-radius:8px;padding:7px 13px;font-size:13px;font-weight:600;transition:opacity .15s;border:none;}
.btn-sm:active{opacity:.6;}
.row{display:flex;align-items:center;justify-content:space-between;}
.label{font-size:13px;color:var(--text3);margin-bottom:7px;}
.section-title{font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin:20px 0 10px;}
.chip{background:var(--bg3);border-radius:8px;padding:3px 9px;font-size:12px;color:var(--text3);display:inline-block;}
.pill{border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;display:inline-block;}
.month-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px;}
.month-btn{padding:8px 4px;border-radius:8px;font-size:13px;font-weight:600;background:var(--bg3);color:var(--text3);border:1px solid var(--border);cursor:pointer;font-family:inherit;transition:all .15s;}
.month-btn.on{background:var(--blue);color:#fff;border-color:var(--blue);}
.month-btn:active{opacity:.7;}
/* Nav */
#nav{position:fixed;bottom:0;left:0;right:0;background:rgba(28,28,30,.97);border-top:1px solid var(--border);display:flex;padding:8px 0;padding-bottom:calc(8px + env(safe-area-inset-bottom,0px));z-index:100;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--text3);font-size:10px;font-family:inherit;padding:4px 0;transition:color .15s;}
.nav-btn.active{color:var(--blue);}
.nav-icon{font-size:22px;line-height:1;}
/* App container — extra bottom padding so last card is always reachable */
#app{padding-left:16px;padding-right:16px;padding-bottom:calc(env(safe-area-inset-bottom,0px) + 110px);max-width:430px;margin:0 auto;padding-top:100px;}
.page{display:none;}
.page.active{display:block;animation:fadeIn .2s ease;}
#header{position:fixed;top:0;left:0;right:0;padding:calc(env(safe-area-inset-top,44px)+10px) 20px 12px;background:rgba(0,0,0,.97);z-index:50;}
#modal-wrap{position:fixed;inset:0;z-index:200;}
#overlay{position:absolute;inset:0;background:rgba(0,0,0,.65);}
#sheet{position:absolute;bottom:0;left:0;right:0;background:var(--bg2);border-radius:20px 20px 0 0;padding:20px;padding-bottom:calc(32px + env(safe-area-inset-bottom,0px));max-height:92vh;overflow-y:auto;}
/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
.pos{color:var(--green)!important;}.neg{color:var(--red)!important;}.zer{color:var(--text3)!important;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.empty{text-align:center;padding:50px 0;color:var(--text4);}
.empty-icon{font-size:44px;margin-bottom:12px;}
.stat-box .stat-label{font-size:11px;color:var(--text3);margin-bottom:3px;}
.stat-box .stat-val{font-size:13px;font-weight:600;}
.spin{display:inline-block;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
#toast{position:fixed;top:calc(env(safe-area-inset-top,44px)+70px);left:50%;transform:translateX(-50%);background:var(--bg3);color:var(--text);padding:10px 20px;border-radius:20px;font-size:14px;z-index:300;display:none;white-space:nowrap;border:1px solid var(--border);}
/* Sparkline chart */
#sparkline-wrap{width:100%;height:80px;margin-top:8px;}
canvas#sparkline{width:100%;height:80px;}
/* Notification cards */
.notif-card{border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px;}
/* Ledger rows */
.ledger-in{color:var(--green);}
.ledger-out{color:var(--red);}
.ledger-div{color:var(--purple);}
</style>
</head>
<body>

<div id="header">
  <div style="font-size:24px;font-weight:900;letter-spacing:-0.5px">存股追蹤</div>
  <div id="header-date" style="font-size:12px;color:var(--text3);margin-top:2px"></div>
</div>
<div id="toast"></div>

<div id="app">

<!-- ══ DASHBOARD ══════════════════════════════════════════════════════════ -->
<div class="page active" id="page-dashboard">

  <!-- Notification centre (replaces 每日提醒 card) -->
  <div id="notif-centre" style="margin-bottom:12px"></div>

  <!-- Market value -->
  <div class="card" style="background:linear-gradient(135deg,#0a84ff18,#30d15818);border:1px solid #0a84ff33">
    <div style="font-size:13px;color:var(--text3);margin-bottom:4px">持股市值</div>
    <div class="mono" id="total-mkt" style="font-size:38px;font-weight:900">$0</div>
    <canvas id="sparkline" height="60" style="width:100%;height:60px;margin-top:8px;display:block"></canvas>
    <div style="display:flex;gap:20px;margin-top:10px;flex-wrap:wrap">
      <div><div style="font-size:11px;color:var(--text3)">總成本</div><div class="mono" id="total-cost-d" style="font-weight:700">$0</div></div>
      <div><div style="font-size:11px;color:var(--text3)">未實現損益</div><div class="mono" id="unreal-pnl" style="font-weight:700">$0</div></div>
      <div><div style="font-size:11px;color:var(--text3)">已實現損益</div><div class="mono" id="real-pnl" style="font-weight:700">$0</div></div>
    </div>
  </div>

  <!-- Div summary -->
  <div class="grid2" style="margin-bottom:12px">
    <div class="card" style="background:#30d15818;border:1px solid #30d15833;margin-bottom:0">
      <div style="font-size:11px;color:var(--text3);margin-bottom:4px" id="this-month-label">本月預估股息</div>
      <div class="mono" id="div-this" style="font-size:22px;font-weight:800;color:var(--green)">$0</div>
    </div>
    <div class="card" style="background:#0a84ff18;border:1px solid #0a84ff33;margin-bottom:0">
      <div style="font-size:11px;color:var(--text3);margin-bottom:4px" id="next-month-label">下月預估股息</div>
      <div class="mono" id="div-next" style="font-size:22px;font-weight:800;color:var(--blue)">$0</div>
    </div>
    <div class="card" style="background:#ffd60a18;border:1px solid #ffd60a33;margin-bottom:0">
      <div style="font-size:11px;color:var(--text3);margin-bottom:4px">年度預估股息</div>
      <div class="mono" id="div-year" style="font-size:22px;font-weight:800;color:var(--yellow)">$0</div>
    </div>
    <div class="card" style="background:#bf5af218;border:1px solid #bf5af233;margin-bottom:0">
      <div style="font-size:11px;color:var(--text3);margin-bottom:4px">累計收到股息</div>
      <div class="mono" id="div-received" style="font-size:22px;font-weight:800;color:var(--purple)">$0</div>
    </div>
  </div>

  <!-- Query card -->
  <div class="card">
    <div class="row">
      <div>
        <div style="font-weight:700;font-size:15px">股價 &amp; 配息月查詢</div>
        <div id="ai-msg" style="font-size:12px;color:var(--text3);margin-top:2px">從 Yahoo Finance 抓取股價與配息月</div>
      </div>
      <button class="btn btn-blue" onclick="queryPriceAndDiv()" id="ai-btn" style="width:72px;padding:10px 0;font-size:14px;border-radius:10px">查詢</button>
    </div>
    <div id="ai-updated" style="font-size:11px;color:var(--text4);margin-top:8px;display:none"></div>
  </div>

  <div class="section-title">持股快覽</div>
  <div id="dashboard-holdings"></div>
</div>

<!-- ══ HOLDINGS ══════════════════════════════════════════════════════════ -->
<div class="page" id="page-holdings">
  <div class="row" style="margin-bottom:16px">
    <div style="font-size:22px;font-weight:900">我的持股</div>
    <button class="btn-sm btn-blue" onclick="openModal('addHolding')" style="color:#fff">＋ 新增</button>
  </div>
  <div id="holdings-list"></div>
  <!-- extra spacer so last card's buttons are always reachable -->
  <div style="height:20px"></div>
</div>

<!-- ══ DIVIDENDS ══════════════════════════════════════════════════════════ -->
<div class="page" id="page-dividends">
  <div style="font-size:22px;font-weight:900;margin-bottom:4px">股息紀錄</div>
  <div style="font-size:13px;color:var(--text3);margin-bottom:16px">累計收到 <span class="mono" id="div-total-h" style="color:var(--purple);font-weight:700">$0</span></div>
  <div class="section-title">月曆總覽</div>
  <div class="grid4" id="div-calendar" style="margin-bottom:4px"></div>
  <!-- Month detail panel -->
  <div id="div-month-detail" style="display:none;margin-bottom:12px"></div>
  <div class="section-title">入帳明細</div>
  <div id="div-history-list"></div>
  <div style="height:20px"></div>
</div>

<!-- ══ LEDGER (金錢流向) ═══════════════════════════════════════════════════ -->
<div class="page" id="page-ledger">
  <div style="font-size:22px;font-weight:900;margin-bottom:4px">金錢流向</div>
  <div style="font-size:13px;color:var(--text3);margin-bottom:16px">所有買賣、股息、出入帳紀錄</div>
  <!-- Summary -->
  <div class="grid3" style="margin-bottom:12px">
    <div class="card2" style="margin-bottom:0;text-align:center">
      <div style="font-size:10px;color:var(--text3);margin-bottom:4px">總買入</div>
      <div class="mono" id="ledger-buy" style="font-size:14px;font-weight:700;color:var(--red)">$0</div>
    </div>
    <div class="card2" style="margin-bottom:0;text-align:center">
      <div style="font-size:10px;color:var(--text3);margin-bottom:4px">總賣出</div>
      <div class="mono" id="ledger-sell" style="font-size:14px;font-weight:700;color:var(--green)">$0</div>
    </div>
    <div class="card2" style="margin-bottom:0;text-align:center">
      <div style="font-size:10px;color:var(--text3);margin-bottom:4px">總股息</div>
      <div class="mono" id="ledger-div" style="font-size:14px;font-weight:700;color:var(--purple)">$0</div>
    </div>
  </div>
  <div id="ledger-list"></div>
  <div style="height:20px"></div>
</div>

<!-- ══ CHART (圖表 + 美股指數) ═══════════════════════════════════════════ -->
<div class="page" id="page-chart">
  <div style="font-size:22px;font-weight:900;margin-bottom:16px">市場概覽</div>

  <!-- Portfolio value chart -->
  <div class="card">
    <div style="font-weight:700;font-size:15px;margin-bottom:4px">📈 我的持股市值趨勢</div>
    <div style="font-size:11px;color:var(--text3);margin-bottom:10px">每次按「查詢」自動記錄快照</div>
    <canvas id="main-chart" height="160" style="width:100%;height:160px;display:block"></canvas>
    <div id="chart-empty" style="text-align:center;padding:30px 0;color:var(--text4);font-size:13px;display:none">尚無歷史資料<br>按「查詢」後開始記錄</div>
  </div>

  <!-- US indices -->
  <div style="font-weight:700;font-size:15px;margin:4px 0 10px">🇺🇸 美股指數</div>
  <div id="us-indices">
    <div class="card2" style="text-align:center;color:var(--text4);font-size:13px">點下方「更新美股」載入</div>
  </div>
  <button class="btn btn-gray" onclick="fetchUSIndices()" id="us-btn" style="margin-top:4px">更新美股指數</button>
  <div style="height:20px"></div>
</div>

</div><!-- /app -->

<nav id="nav">
  <button class="nav-btn active" onclick="switchTab('dashboard')" id="nav-dashboard"><span class="nav-icon">📊</span><span>總覽</span></button>
  <button class="nav-btn" onclick="switchTab('holdings')"  id="nav-holdings"><span class="nav-icon">💼</span><span>持股</span></button>
  <button class="nav-btn" onclick="switchTab('dividends')" id="nav-dividends"><span class="nav-icon">💰</span><span>股息</span></button>
  <button class="nav-btn" onclick="switchTab('ledger')"    id="nav-ledger"><span class="nav-icon">📒</span><span>流向</span></button>
  <button class="nav-btn" onclick="switchTab('chart')"     id="nav-chart"><span class="nav-icon">📉</span><span>圖表</span></button>
</nav>

<div id="modal-wrap" style="display:none">
  <div id="overlay" onclick="closeModal()"></div>
  <div id="sheet"></div>
</div>

<script>
// ══ STATE ════════════════════════════════════════════════════════════════════
// holdings : {code,name,shares,avgPrice,lots,divMonths,_divMonthsManual}
// sells    : {id,code,name,shares,sellPrice,avgCost,profit,date}
// divHistory:{id,code,name,perShare,shares,total,date,period}
// stockInfo : {[code]:{name,price,divMonths,lastDivAmount,updatedAt}}
// snapshots : [{date,value}]  — market value history
let state={holdings:[],sells:[],divHistory:[],stockInfo:{},snapshots:[]};
let currentModal=null,selectedHolding=null,tempMonths=[];

function save(){localStorage.setItem('stdv5',JSON.stringify(state));}
function load(){
  try{const d=localStorage.getItem('stdv5');if(d)state={...state,...JSON.parse(d)};}catch{}
  // migrate from previous versions
  ['stdv4','stdv3'].forEach(k=>{
    try{
      if(!localStorage.getItem('stdv5')&&localStorage.getItem(k)){
        const old=JSON.parse(localStorage.getItem(k));
        state={...state,...old};
        if(!state.snapshots)state.snapshots=[];
        save();
      }
    }catch{}
  });
  if(!state.snapshots)state.snapshots=[];
}

// ══ HELPERS ══════════════════════════════════════════════════════════════════
const now=new Date();
const THIS_MONTH=now.getMonth()+1;
const NEXT_MONTH=THIS_MONTH===12?1:THIS_MONTH+1;
const MONTHS=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

function fmt(n,d=0){if(isNaN(n))return'0';return Number(n).toLocaleString('zh-TW',{minimumFractionDigits:d,maximumFractionDigits:d});}
function fmtDate(iso){return new Date(iso).toLocaleDateString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit'});}
function pnlClass(v){return v>0?'pos':v<0?'neg':'zer';}
function pnlSign(v){return v>0?'+':'';}
function getPrice(code){return state.stockInfo[code]?.price||0;}
function getDivMonths(h){return h.divMonths||state.stockInfo[h.code]?.divMonths||[];}
function getEstimatedDiv(code,month){
  const info=state.stockInfo[code];
  if(!info)return 0;
  const months=info.divMonths||[];
  if(!months.includes(month))return 0;
  return info.lastDivAmount||0;
}
function getDivInMonth(h,month){
  const months=getDivMonths(h);
  if(!months.includes(month))return 0;
  return getEstimatedDiv(h.code,month)*h.shares;
}
function hasRecordedDivThisMonth(code){
  const key=`${now.getFullYear()}-${String(THIS_MONTH).padStart(2,'0')}`;
  return state.divHistory.some(d=>d.code===code&&d.period===key);
}
function calcTotalMktVal(){
  return state.holdings.reduce((s,h)=>s+h.shares*(getPrice(h.code)||h.avgPrice),0);
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.display='block';
  setTimeout(()=>t.style.display='none',2500);
}

// ══ TABS ═════════════════════════════════════════════════════════════════════
function switchTab(tab){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  document.getElementById('nav-'+tab).classList.add('active');
  renderAll();
}

// ══ MODALS ═══════════════════════════════════════════════════════════════════
function openModal(type,code){
  if(type==='editDivMonths'){
    const h=state.holdings.find(h=>h.code===code);
    tempMonths=[...(getDivMonths(h)||[])];
  }
  selectedHolding=code?state.holdings.find(h=>h.code===code):null;
  currentModal=type;
  const wrap=document.getElementById('modal-wrap');
  wrap.style.display='block';
  const sheet=document.getElementById('sheet');
  sheet.style.animation='none';sheet.offsetHeight;
  sheet.style.animation='slideUp .28s ease';
  if(type==='addHolding')    renderAddHoldingModal();
  if(type==='addSell')       renderAddSellModal();
  if(type==='addDiv')        renderAddDivModal();
  if(type==='deleteHolding') renderDeleteHoldingModal();
  if(type==='editDivMonths') renderEditDivMonthsModal();
  if(type==='holdingDetail') renderHoldingDetailModal();
  if(type==='divPrompt')     renderDivPromptModal(code);
  if(type==='divMonthDetail')renderDivMonthDetailModal(code); // code = month number
}
function openHoldingDetail(code){
  selectedHolding=state.holdings.find(h=>h.code===code);
  currentModal='holdingDetail';
  document.getElementById('modal-wrap').style.display='block';
  const sheet=document.getElementById('sheet');
  sheet.style.animation='none';sheet.offsetHeight;sheet.style.animation='slideUp .28s ease';
  renderHoldingDetailModal();
}
function closeModal(){document.getElementById('modal-wrap').style.display='none';currentModal=null;selectedHolding=null;}

// ══ RENDER ALL ════════════════════════════════════════════════════════════════
function renderAll(){renderDashboard();renderHoldings();renderDividends();renderLedger();renderChart();}

// ══ DASHBOARD ════════════════════════════════════════════════════════════════
function renderDashboard(){
  const totalCost=state.holdings.reduce((s,h)=>s+h.shares*h.avgPrice,0);
  const totalMkt=calcTotalMktVal();
  const unrealPnL=totalMkt-totalCost;
  const realPnL=state.sells.reduce((s,v)=>s+v.profit,0);
  // Fix #6: use getDivMonths(h) not stockInfo directly
  const divThis=state.holdings.reduce((s,h)=>s+getDivInMonth(h,THIS_MONTH),0);
  const divNext=state.holdings.reduce((s,h)=>s+getDivInMonth(h,NEXT_MONTH),0);
  const divYear=state.holdings.reduce((s,h)=>{
    const months=getDivMonths(h);
    return s+months.reduce((ss,m)=>ss+getEstimatedDiv(h.code,m)*h.shares,0);
  },0);
  const divReceived=state.divHistory.reduce((s,d)=>s+d.total,0);

  document.getElementById('total-mkt').textContent='$'+fmt(totalMkt);
  document.getElementById('total-cost-d').textContent='$'+fmt(totalCost);
  const up=document.getElementById('unreal-pnl');up.textContent=pnlSign(unrealPnL)+'$'+fmt(unrealPnL);up.className='mono '+pnlClass(unrealPnL);
  const rp=document.getElementById('real-pnl');rp.textContent=pnlSign(realPnL)+'$'+fmt(realPnL);rp.className='mono '+pnlClass(realPnL);
  document.getElementById('this-month-label').textContent=THIS_MONTH+'月預估股息';
  document.getElementById('next-month-label').textContent=NEXT_MONTH+'月預估股息';
  document.getElementById('div-this').textContent='$'+fmt(divThis);
  document.getElementById('div-next').textContent='$'+fmt(divNext);
  document.getElementById('div-year').textContent='$'+fmt(divYear);
  document.getElementById('div-received').textContent='$'+fmt(divReceived);

  // Sparkline (mini)
  drawSparkline('sparkline',state.snapshots,totalMkt);

// ══ SPARKLINE ════════════════════════════════════════════════════════════════
function drawSparkline(canvasId,snapshots,currentVal){
  const canvas=document.getElementById(canvasId);
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const W=canvas.offsetWidth||320,H=canvas.offsetHeight||60;
  canvas.width=W;canvas.height=H;
  ctx.clearRect(0,0,W,H);

  const pts=[...snapshots.map(s=>s.value),currentVal].filter(v=>v>0);
  if(pts.length<2){
    ctx.fillStyle='#48484a';ctx.font='12px sans-serif';ctx.textAlign='center';
    ctx.fillText('查詢後顯示趨勢',W/2,H/2);return;
  }
  const min=Math.min(...pts),max=Math.max(...pts);
  const range=max-min||1;
  const pad=6;
  const xs=(i)=>pad+(i/(pts.length-1))*(W-pad*2);
  const ys=(v)=>H-pad-(v-min)/range*(H-pad*2);

  // gradient fill
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'rgba(48,209,88,.35)');
  grad.addColorStop(1,'rgba(48,209,88,0)');
  ctx.beginPath();
  ctx.moveTo(xs(0),ys(pts[0]));
  pts.forEach((v,i)=>{if(i>0)ctx.lineTo(xs(i),ys(v));});
  ctx.lineTo(xs(pts.length-1),H);ctx.lineTo(xs(0),H);ctx.closePath();
  ctx.fillStyle=grad;ctx.fill();

  // line
  ctx.beginPath();
  ctx.moveTo(xs(0),ys(pts[0]));
  pts.forEach((v,i)=>{if(i>0)ctx.lineTo(xs(i),ys(v));});
  ctx.strokeStyle='#30d158';ctx.lineWidth=2;ctx.stroke();

  // last dot
  const lx=xs(pts.length-1),ly=ys(pts[pts.length-1]);
  ctx.beginPath();ctx.arc(lx,ly,4,0,Math.PI*2);
  ctx.fillStyle='#30d158';ctx.fill();
}

function renderLedger(){
  // Build unified transaction list
  const txns=[];
  // Buys from lots
  state.holdings.forEach(h=>{
    (h.lots||[]).forEach(l=>{
      txns.push({id:'buy-'+h.code+'-'+l.date,type:'buy',code:h.code,name:h.name,
        label:`買入 ${fmt(l.shares)}股 @ $${fmt(l.price,2)}`,
        amount:-(l.shares*l.price),date:l.date});
    });
  });
  // Sells
  state.sells.forEach(s=>{
    txns.push({id:'sell-'+s.id,type:'sell',code:s.code,name:s.name,
      label:`賣出 ${fmt(s.shares)}股 @ $${fmt(s.sellPrice,2)}`,
      amount:s.shares*s.sellPrice,date:s.date,deleteId:s.id,deleteFn:'deleteSell'});
  });
  // Dividends
  state.divHistory.forEach(d=>{
    txns.push({id:'div-'+d.id,type:'div',code:d.code,name:d.name,
      label:`股息 ${fmt(d.shares)}股 × $${fmt(d.perShare,3)}${d.period?' ('+d.period+')':''}`,

  // Sort newest first
  txns.sort((a,b)=>new Date(b.date)-new Date(a.date));

  const totalBuy=txns.filter(t=>t.type==='buy').reduce((s,t)=>s+Math.abs(t.amount),0);
  const totalSell=txns.filter(t=>t.type==='sell').reduce((s,t)=>s+t.amount,0);

  document.getElementById('ledger-sell').textContent='$'+fmt(totalSell);

  const list=document.getElementById('ledger-list');

  const typeConf={

    div:{icon:'💰',label:'股息',color:'var(--purple)',sign:'+'},

  list.innerHTML=txns.map(t=>{

          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;margin-left:8px">
          <div class="mono" style="font-weight:700;color:${c.color};white-space:nowrap">${c.sign}$${fmt(Math.abs(t.amount))}</div>

// ══ CHART PAGE ════════════════════════════════════════════════════════════════
function renderChart(){
  const snapshots=state.snapshots||[];
  const currentVal=calcTotalMktVal();
  const allPts=[...snapshots,{date:new Date().toISOString().slice(0,10),value:currentVal}].filter(p=>p.value>0);

  const canvas=document.getElementById('main-chart');
  const emptyEl=document.getElementById('chart-empty');
  if(!canvas)return;

  if(allPts.length<2){
    canvas.style.display='none';
    emptyEl.style.display='block';
    return;
  }
  canvas.style.display='block';emptyEl.style.display='none';

  const ctx=canvas.getContext('2d');
  const W=canvas.offsetWidth||360,H=160;
  canvas.width=W;canvas.height=H;
  ctx.clearRect(0,0,W,H);

  const vals=allPts.map(p=>p.value);
  const min=Math.min(...vals)*0.995,max=Math.max(...vals)*1.005;
  const range=max-min||1;
  const padL=10,padR=10,padT=10,padB=24;
  const xs=(i)=>padL+(i/(allPts.length-1))*(W-padL-padR);
  const ys=(v)=>padT+(1-(v-min)/range)*(H-padT-padB);

  // grid lines
  ctx.strokeStyle='#38383a';ctx.lineWidth=1;
  [0.25,0.5,0.75].forEach(r=>{
    const y=padT+r*(H-padT-padB);
    ctx.beginPath();ctx.moveTo(padL,y);ctx.lineTo(W-padR,y);ctx.stroke();
  });

  // gradient fill
  const grad=ctx.createLinearGradient(0,padT,0,H-padB);
  grad.addColorStop(0,'rgba(10,132,255,.4)');grad.addColorStop(1,'rgba(10,132,255,0)');
  ctx.beginPath();ctx.moveTo(xs(0),ys(vals[0]));
  vals.forEach((v,i)=>{if(i>0)ctx.lineTo(xs(i),ys(v));});
  ctx.lineTo(xs(vals.length-1),H-padB);ctx.lineTo(xs(0),H-padB);ctx.closePath();
  ctx.fillStyle=grad;ctx.fill();

  // line
  ctx.beginPath();ctx.moveTo(xs(0),ys(vals[0]));
  vals.forEach((v,i)=>{if(i>0)ctx.lineTo(xs(i),ys(v));});
  ctx.strokeStyle='#0a84ff';ctx.lineWidth=2.5;ctx.stroke();

  // dots
  vals.forEach((v,i)=>{
    ctx.beginPath();ctx.arc(xs(i),ys(v),3,0,Math.PI*2);
    ctx.fillStyle='#0a84ff';ctx.fill();
  });

  // date labels (first and last)
  ctx.fillStyle='#8e8e93';ctx.font='10px sans-serif';
  ctx.textAlign='left';ctx.fillText(allPts[0].date.slice(5),padL,H-6);
  ctx.textAlign='right';ctx.fillText(allPts[allPts.length-1].date.slice(5),W-padR,H-6);
}

      const proxy='https://api.allorigins.win/get?url='+encodeURIComponent(url);
      const r=await fetch(proxy);
      const outer=await r.json();
      const data=JSON.parse(outer.contents);
      const meta=data?.chart?.result?.[0]?.meta;
      if(meta){
        const price=meta.regularMarketPrice;
        const prev=meta.chartPreviousClose||meta.previousClose;
        const chg=price-prev;
        const pct=prev?(chg/prev*100):0;
        results.push({name:idx.name,price,chg,pct});
      }
    }catch{}
  }

  if(results.length===0){
    el.innerHTML='<div class="card2" style="color:var(--red)">查詢失敗，請稍後再試</div>';
  } else {
    el.innerHTML=results.map(r=>`
      <div class="card2" style="margin-bottom:8px">
        <div class="row">
          <div style="font-weight:700;font-size:15px">${r.name}</div>
          <div style="text-align:right">
            <div class="mono" style="font-size:18px;font-weight:800">${r.price.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
            <div class="mono ${pnlClass(r.chg)}" style="font-size:13px;font-weight:600">
              ${pnlSign(r.chg)}${r.chg.toFixed(2)} (${pnlSign(r.pct)}${r.pct.toFixed(2)}%)
            </div>
          </div>
        </div>
      </div>`).join('');
  }
  btn.disabled=false;btn.textContent='更新美股指數';
}

// ══ ACTIONS ══════════════════════════════════════════════════════════════════
function submitHolding(){
  const codeEl=document.getElementById('f-code');
  const code=(codeEl?codeEl.value:selectedHolding?.code)?.trim().toUpperCase();
  const shares=parseFloat(document.getElementById('f-shares').value);
  const price=parseFloat(document.getElementById('f-price').value);
  if(!code||isNaN(shares)||isNaN(price)||shares<=0||price<=0){showToast('請填寫所有欄位');return;}
  const date=new Date().toISOString();
  const lot={shares,price,date};
  const existing=state.holdings.find(h=>h.code===code);
  if(existing){
    const ns=existing.shares+shares;
    const na=(existing.shares*existing.avgPrice+shares*price)/ns;
    state.holdings=state.holdings.map(h=>h.code===code?{...h,shares:ns,avgPrice:parseFloat(na.toFixed(4)),lots:[...(h.lots||[]),lot]}:h);
  } else {
    const name=state.stockInfo[code]?.name||code;
    state.holdings.push({code,name,shares,avgPrice:price,lots:[lot],divMonths:[]});
  }
  save();closeModal();renderAll();showToast('✓ 新增完成');
}

function submitSell(){
  const h=selectedHolding;
  const shares=parseFloat(document.getElementById('f-sell-shares').value);
  const sellPrice=parseFloat(document.getElementById('f-sell-price').value);
  if(isNaN(shares)||isNaN(sellPrice)||shares<=0||shares>h.shares){showToast('請檢查輸入值');return;}
  const profit=(sellPrice-h.avgPrice)*shares;
  state.sells.unshift({id:Date.now(),code:h.code,name:h.name,shares,sellPrice,avgCost:h.avgPrice,profit,date:new Date().toISOString()});
  const ns=h.shares-shares;
  if(ns<=0)state.holdings=state.holdings.filter(hh=>hh.code!==h.code);
  else state.holdings=state.holdings.map(hh=>hh.code===h.code?{...hh,shares:ns}:hh);
  save();closeModal();renderAll();showToast('✓ 賣出記錄完成');
}

function submitDiv(){
  const h=selectedHolding;
  const perShare=parseFloat(document.getElementById('f-div-per').value);
  const date=document.getElementById('f-div-date').value;
  // Fix: allow 0
  if(isNaN(perShare)||perShare<0){showToast('請輸入每股股息（可填 0）');return;}
  const period=`${now.getFullYear()}-${String(THIS_MONTH).padStart(2,'0')}`;
  state.divHistory.unshift({id:Date.now(),code:h.code,name:h.name,perShare,shares:h.shares,total:perShare*h.shares,date,period});
  if(!state.stockInfo[h.code])state.stockInfo[h.code]={};
  state.stockInfo[h.code].lastDivAmount=perShare;
  save();closeModal();renderAll();showToast('✓ 股息記錄完成');
}

function deleteHolding(code){
  state.holdings=state.holdings.filter(h=>h.code!==code);
  save();closeModal();renderAll();showToast('已刪除持股');
}
function deleteSell(id){state.sells=state.sells.filter(s=>s.id!==id);save();renderAll();}
function deleteDivHistory(id){state.divHistory=state.divHistory.filter(d=>d.id!==id);save();renderAll();}

// Delete a single lot entry and recalculate avgPrice
function deleteLot(code,lotIndex){
  const h=state.holdings.find(h=>h.code===code);
  if(!h||!h.lots)return;
  const newLots=h.lots.filter((_,i)=>i!==lotIndex);
  if(newLots.length===0){
    // No lots left, remove holding
    state.holdings=state.holdings.filter(hh=>hh.code!==code);
    save();closeModal();renderAll();showToast('持股已全部刪除');return;
  }
  const totalShares=newLots.reduce((s,l)=>s+l.shares,0);
  const avgPrice=newLots.reduce((s,l)=>s+l.shares*l.price,0)/totalShares;
  state.holdings=state.holdings.map(hh=>hh.code===code?{...hh,shares:totalShares,avgPrice:parseFloat(avgPrice.toFixed(4)),lots:newLots}:hh);
  save();
  // Re-render the detail modal
  selectedHolding=state.holdings.find(h=>h.code===code);
  renderHoldingDetailModal();
  renderAll();
  showToast('✓ 已刪除該筆買入記錄');
}

// ══ QUERY ════════════════════════════════════════════════════════════════════
async function queryPriceAndDiv(){
  if(state.holdings.length===0){showToast('請先新增持股');return;}
  const btn=document.getElementById('ai-btn');
  const msg=document.getElementById('ai-msg');
  btn.disabled=true;btn.innerHTML='<span class="spin">⟳</span>';
  msg.textContent='查詢中...';

  let priceOk=0,divOk=0;
  const updatedAt=new Date().toISOString();

  for(const h of state.holdings){
    const code=h.code.trim();
    let sym='',meta=null;
    for(const suffix of ['.TW','.TWO']){
      try{
        const url='https://query1.finance.yahoo.com/v8/finance/chart/'+code+suffix+'?interval=1d&range=5d';
        const proxy='https://api.allorigins.win/get?url='+encodeURIComponent(url);
        const r=await fetch(proxy);
        const outer=await r.json();
        const data=JSON.parse(outer.contents);
        const m=data?.chart?.result?.[0]?.meta;
        if(m&&m.regularMarketPrice){meta=m;sym=code+suffix;break;}
      }catch{}
    }
    if(meta){
      const price=Math.round(meta.regularMarketPrice*100)/100;
      const name=meta.shortName||meta.longName||code;
      if(!state.stockInfo[code])state.stockInfo[code]={};
      state.stockInfo[code]={...state.stockInfo[code],name,price,updatedAt};
      state.holdings=state.holdings.map(hh=>hh.code===code?{...hh,name}:hh);
      priceOk++;
      // Fetch dividend history
      try{
        const divUrl='https://query1.finance.yahoo.com/v8/finance/chart/'+sym+'?interval=3mo&range=2y&events=dividends';
        const divProxy='https://api.allorigins.win/get?url='+encodeURIComponent(divUrl);
        const dr=await fetch(divProxy);
        const dOuter=await dr.json();
        const dData=JSON.parse(dOuter.contents);
        const events=dData?.chart?.result?.[0]?.events?.dividends;
        if(events){
          const months=[...new Set(Object.values(events).map(e=>new Date(e.date*1000).getMonth()+1))].sort((a,b)=>a-b);
          if(months.length>0){
            state.stockInfo[code].divMonths=months;
            const vals=Object.values(events).sort((a,b)=>b.date-a.date);
            if(vals.length>0)state.stockInfo[code].lastDivAmount=Math.round(vals[0].amount*1000)/1000;
            state.holdings=state.holdings.map(hh=>{
              if(hh.code!==code)return hh;
              if(hh._divMonthsManual)return hh;
              return {...hh,divMonths:months};
            });
            divOk++;
          }
        }
      }catch{}
    }
  }

  // Save market value snapshot
  const totalMkt=calcTotalMktVal();
  if(totalMkt>0){
    const today=new Date().toISOString().slice(0,10);
    // Upsert today's snapshot
    const idx=state.snapshots.findIndex(s=>s.date===today);
    if(idx>=0)state.snapshots[idx].value=totalMkt;
    else state.snapshots.push({date:today,value:totalMkt});
    // Keep last 90 snapshots
    if(state.snapshots.length>90)state.snapshots=state.snapshots.slice(-90);
  }

  save();renderAll();
  if(priceOk>0){
    msg.textContent=`✓ 股價更新 ${priceOk} 支${divOk>0?'，配息月更新 '+divOk+' 支':''} · ${new Date().toLocaleTimeString('zh-TW')}`;
    const upEl=document.getElementById('ai-updated');
    upEl.style.display='block';
    upEl.textContent=divOk<state.holdings.length?'部分股票無配息資料，可手動設定配息月':'配息月已自動更新';
    showToast('✓ 查詢完成');
  } else {
    msg.textContent='⚠ 查詢失敗，請確認網路並重試';
    showToast('查詢失敗，請重試');
  }
  btn.disabled=false;btn.textContent='查詢';
}

(function setupPWA(){
  const manifest={name:'存股追蹤器',short_name:'存股追蹤',start_url:'./',display:'standalone',orientation:'portrait',background_color:'#000000',theme_color:'#000000',
    icons:[{src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='40' fill='%23000'/%3E%3Ctext y='.85em' font-size='140' x='20'%3E📈%3C/text%3E%3C/svg%3E",sizes:'192x192',type:'image/svg+xml'}]};
  const blob=new Blob([JSON.stringify(manifest)],{type:'application/json'});
  document.getElementById('pwa-manifest').href=URL.createObjectURL(blob);
  if('serviceWorker' in navigator){
    const sw=`const C='sv5';self.addEventListener('install',e=>e.waitUntil(caches.open(C).then(c=>c.addAll([self.location.pathname])).then(()=>self.skipWaiting())));self.addEventListener('activate',e=>e.waitUntil(clients.claim()));self.addEventListener('fetch',e=>{if(e.request.mode==='navigate')e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)));});`;
    navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'text/javascript'}))).catch(()=>{});
  }
})();
