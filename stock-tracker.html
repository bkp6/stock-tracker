<style>
:root{--bg:#000;--bg2:#1c1c1e;--bg3:#2c2c2e;--text:#fff;--text2:#ebebf5cc;--text3:#8e8e93;--text4:#48484a;--blue:#0a84ff;--green:#30d158;--red:#ff453a;--yellow:#ffd60a;--purple:#bf5af2;--border:#38383a;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',-apple-system,sans-serif;min-height:100%;overflow-x:hidden;}
::-webkit-scrollbar{display:none;}
input,select{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:13px 14px;border-radius:10px;font-family:inherit;font-size:16px;width:100%;outline:none;-webkit-appearance:none;appearance:none;}
input:focus{border-color:var(--blue);}input::placeholder{color:var(--text4);}input[type="date"]{color-scheme:dark;}
button{cursor:pointer;font-family:inherit;border:none;-webkit-appearance:none;}
.mono{font-variant-numeric:tabular-nums;}
.card{background:var(--bg2);border-radius:16px;padding:16px;margin-bottom:12px;}
.card2{background:var(--bg3);border-radius:12px;padding:14px;margin-bottom:8px;}
.btn{border-radius:12px;padding:14px 0;font-size:16px;font-weight:600;width:100%;transition:opacity .15s;display:block;text-align:center;}.btn:active{opacity:.6;}
.btn-blue{background:var(--blue);color:#fff;}.btn-red{background:var(--red);color:#fff;}.btn-green{background:var(--green);color:#fff;}.btn-gray{background:var(--bg3);color:var(--text);}
.btn-sm{border-radius:8px;padding:7px 11px;font-size:13px;font-weight:600;transition:opacity .15s;white-space:nowrap;}.btn-sm:active{opacity:.6;}
.row{display:flex;align-items:center;justify-content:space-between;}
.label{font-size:13px;color:var(--text3);margin-bottom:7px;}
.sec{font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin:20px 0 10px;}
.chip{background:var(--bg3);border-radius:8px;padding:3px 9px;font-size:12px;color:var(--text3);display:inline-block;}

.month-btn.on{background:var(--blue);color:#fff;border-color:var(--blue);}
#nav{position:fixed;bottom:0;left:0;right:0;background:rgba(28,28,30,.98);border-top:1px solid var(--border);display:flex;padding:8px 0;padding-bottom:calc(8px + env(safe-area-inset-bottom,0px));z-index:100;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--text3);font-size:10px;font-family:inherit;padding:4px 0;transition:color .15s;}
.nav-btn.active{color:var(--blue);}.nav-icon{font-size:22px;line-height:1;}
/* Extra bottom padding ensures last card clears nav bar */
#app{padding-left:16px;padding-right:16px;padding-bottom:calc(env(safe-area-inset-bottom,0px) + 140px);max-width:430px;margin:0 auto;padding-top:100px;}
.page{display:none;}.page.active{display:block;animation:fadeIn .2s ease;}
#header{position:fixed;top:0;left:0;right:0;padding:calc(env(safe-area-inset-top,50px)+16px) 24px 14px;background:rgba(0,0,0,.98);z-index:50;}
#modal-wrap{position:fixed;inset:0;z-index:200;}
#overlay{position:absolute;inset:0;background:rgba(0,0,0,.65);}
#sheet{position:absolute;bottom:0;left:0;right:0;background:var(--bg2);border-radius:20px 20px 0 0;padding:20px;padding-bottom:calc(32px + env(safe-area-inset-bottom,0px));max-height:90vh;overflow-y:auto;}
.alert-card{background:#30d15818;border:1px solid var(--green);border-radius:14px;padding:13px 15px;margin-bottom:8px;}
.warn-card{background:#ffd60a18;border:1px solid var(--yellow);border-radius:14px;padding:13px 15px;margin-bottom:8px;}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
.pos{color:var(--green)!important;}.neg{color:var(--red)!important;}.zer{color:var(--text3)!important;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.empty{text-align:center;padding:50px 0;color:var(--text4);}
.empty-icon{font-size:44px;margin-bottom:12px;}
.sl{font-size:11px;color:var(--text3);margin-bottom:3px;}.sv{font-size:13px;font-weight:600;}
.spin{display:inline-block;animation:spin 1s linear infinite;}@keyframes spin{to{transform:rotate(360deg)}}
#toast{position:fixed;top:calc(env(safe-area-inset-top,44px)+70px);left:50%;transform:translateX(-50%);background:var(--bg3);color:var(--text);padding:10px 20px;border-radius:20px;font-size:14px;z-index:300;display:none;white-space:nowrap;border:1px solid var(--border);}
</style>

 <!-- Detail panel — shown directly below slider when a stock is selected -->

<script>
// ═══════════════════════════════════════════════════════════════════════════════
// STATE
// holdings : { code, name, shares, lots:[{id,shares,price,date}], divMonths:[], _manual:bool }
//   → avgPrice is COMPUTED from active lots, never stored directly
// sells    : { id, code, name, lots:[{shares,price}], sellPrice, profit, date }
//   → profit = (sellPrice - weightedAvgCost) * totalShares  (FIFO)
// divHistory: { id, code, name, perShare, shares, total, date, period }
// stockInfo : { [code]: { name, price, divMonths, lastDivAmt, updatedAt } }
// mktSnaps  : [{ date, value }]
// ═══════════════════════════════════════════════════════════════════════════════
let S = { holdings:[], sells:[], divHistory:[], stockInfo:{}, mktSnaps:[], holidays:{}, lastQueryTime:null, lastDataDate:null };
let modal=null, selH=null, tempM=[], selMonth=null;

// ── Persistence ───────────────────────────────────────────────────────────────
function save(){ localStorage.setItem('stk6', JSON.stringify(S)); }
function load(){
  try{ const d=localStorage.getItem('stk6'); if(d) S={...S,...JSON.parse(d)}; } catch{}
  // Migrate from older keys — preserve existing data
  if(!localStorage.getItem('stk6')){
    for(const k of ['stdv5','stdv4','stdv3']){
      try{
        const raw=localStorage.getItem(k);
        if(!raw) continue;
        const old=JSON.parse(raw);
        // Re-build holdings to ensure lots have IDs
        if(old.holdings) old.holdings=old.holdings.map(h=>{
          const lots=(h.lots||[]).map((l,i)=>({id:l.id||Date.now()+i,shares:l.shares,price:l.price,date:l.date}));
          return {...h, lots, divMonths:h.divMonths||[]};
        });
        S={...S,...old};
        if(!S.mktSnaps) S.mktSnaps=[];
        save(); break;
      }catch{}
    }
  }
  if(!S.mktSnaps) S.mktSnaps=[];
  if(!S.holidays) S.holidays={};
  if(S.lastQueryTime===undefined) S.lastQueryTime=null;
  if(S.lastDataDate===undefined) S.lastDataDate=null;
  // Ensure all lots have IDs
  S.holdings=S.holdings.map(h=>({...h,lots:(h.lots||[]).map((l,i)=>({...l,id:l.id||(Date.now()+i)}))}));
}

// ── Computed helpers ──────────────────────────────────────────────────────────
const NOW=new Date(), TM=NOW.getMonth()+1, NM=TM===12?1:TM+1;
const MONTHS=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

function fmt(n,d=0){ if(n==null||isNaN(n))return'0'; return Number(n).toLocaleString('zh-TW',{minimumFractionDigits:d,maximumFractionDigits:d}); }
function fmtD(iso){ try{return new Date(iso).toLocaleDateString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit'});}catch{return iso||'';} }
function pc(v){ return v>0?'pos':v<0?'neg':'zer'; }
function ps(v){ return v>0?'+':''; }
function getPrice(code){ return S.stockInfo[code]?.price||0; }
function getDivMonths(h){ return (h.divMonths&&h.divMonths.length>0)?h.divMonths:(S.stockInfo[h.code]?.divMonths||[]); }
function getLastDiv(code){ return S.stockInfo[code]?.lastDivAmt; }

// Compute avgPrice from lots (weighted average of remaining lots)
function avgPrice(h){ 
  const lots=h.lots||[];
  if(!lots.length) return 0;
  const totalShares=lots.reduce((s,l)=>s+l.shares,0);
  if(!totalShares) return 0;
  return lots.reduce((s,l)=>s+l.shares*l.price,0)/totalShares;
}
function totalShares(h){ return (h.lots||[]).reduce((s,l)=>s+l.shares,0); }

function getDivInMonth(h,month){
  if(!getDivMonths(h).includes(month)) return 0;
  return (getLastDiv(h.code)||0)*totalShares(h);
}
function hasRecordedDivThisMonth(code){
  const key=`${NOW.getFullYear()}-${String(TM).padStart(2,'0')}`;
  return S.divHistory.some(d=>d.code===code&&d.period===key);
}
function mktValue(){ return S.holdings.reduce((s,h)=>s+totalShares(h)*(getPrice(h.code)||avgPrice(h)),0); }
function snap(){
  const v=mktValue(); if(!v)return;
  const today=NOW.toISOString().slice(0,10);
  const i=S.mktSnaps.findIndex(s=>s.date===today);
  if(i>=0) S.mktSnaps[i].value=v; else S.mktSnaps.push({date:today,value:v});
  S.mktSnaps=S.mktSnaps.slice(-90);
}

// ── Last query time display ────────────────────────────────────────────────────
function updateLastQueryDisplay(){
  const el=document.getElementById('ai-last-query');
  if(!el) return;
  if(!S.lastQueryTime){ el.textContent=''; return; }
  const t=new Date(S.lastQueryTime);
  const timeStr=t.toLocaleDateString('zh-TW',{month:'2-digit',day:'2-digit'})+' '+t.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
  const shouldWarn=checkShouldUpdatePrice();
  el.textContent='上次查詢：'+timeStr+(S.lastDataDate?' (資料日期：'+S.lastDataDate+')':'');
  el.style.color=shouldWarn?'var(--yellow)':'var(--text4)';
}

// Returns true if market closed today but price not yet updated
function checkShouldUpdatePrice(){
  // All comparisons done in TWN local time (UTC+8)
  const twnNow=new Date(Date.now()+8*3600*1000);
  const twnToday=twnNow.toISOString().slice(0,10); // YYYY-MM-DD in TWN time
  const twnDay=twnNow.getUTCDay(); // 0=Sun,6=Sat in TWN time
  if(twnDay===0||twnDay===6) return false; // weekend
  const yr=parseInt(twnToday.slice(0,4));
  if(S.holidays[yr]&&S.holidays[yr].includes(twnToday)) return false; // holiday
  const twnH=twnNow.getUTCHours(), twnMin=twnNow.getUTCMinutes();
  if(twnH<13||(twnH===13&&twnMin<30)) return false; // before 13:30
  if(S.lastDataDate===twnToday) return false; // already have today data
  return true;
}

// ── TWSE Holiday fetch (once per year) ────────────────────────────────────────
async function fetchHolidaysIfNeeded(){
  const yr=new Date().getFullYear();
  if(S.holidays[yr]&&S.holidays[yr].length>0) return; // already have this year
  try{
    const url='https://openapi.twse.com.tw/v1/holidaySchedule/holidaySchedule';
    const proxy='https://api.allorigins.win/get?url='+encodeURIComponent(url)+'&t='+yr;
    const r=await fetch(proxy);
    const data=JSON.parse((await r.json()).contents);
    // API returns array of {Date, Name, ...} where Date is "YYYYMMDD"
    const dates=data.filter(d=>d.Date).map(d=>{
      const s=String(d.Date);
      if(s.length===8) return s.slice(0,4)+'-'+s.slice(4,6)+'-'+s.slice(6,8);
      return s;
    }).filter(Boolean);
    if(dates.length>0){
      S.holidays[yr]=dates;
      save();
    }
  }catch{}
}

// ── Navigation ────────────────────────────────────────────────────────────────
function switchTab(t){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+t).classList.add('active');
  document.getElementById('nav-'+t).classList.add('active');
  renderAll();

}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal(type,code){
  selH=code?S.holdings.find(h=>h.code===code):null;
  if(type==='editDivMonths') tempM=[...(getDivMonths(selH)||[])];
  modal=type;
  document.getElementById('modal-wrap').style.display='block';
  const s=document.getElementById('sheet');
  s.style.animation='none'; s.offsetHeight; s.style.animation='slideUp .28s ease';
  ({addHolding:mAddHolding,addSell:mAddSell,addDiv:mAddDiv,divPrompt:mDivPrompt,editDivMonths:mEditMonths,deleteHolding:mDelHolding,holdingDetail:mHoldingDetail})[type]?.();
}
function closeModal(){ document.getElementById('modal-wrap').style.display='none'; modal=null; selH=null; }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.style.display='block'; setTimeout(()=>t.style.display='none',2500); }

// ── Render orchestrator ───────────────────────────────────────────────────────
function renderAll(){ rDash(); rHoldings(); rDividends(); rLedger(); }

// ── Dashboard ─────────────────────────────────────────────────────────────────
function rDash(){
  const cost=S.holdings.reduce((s,h)=>s+totalShares(h)*avgPrice(h),0);
  const mkt=mktValue();
  const upnl=mkt-cost;
  const rpnl=S.sells.reduce((s,v)=>s+v.profit,0);
  const divYr=S.holdings.reduce((s,h)=>s+getDivMonths(h).reduce((ss)=>ss+(getLastDiv(h.code)||0)*totalShares(h),0),0);
  const divRecv=S.divHistory.reduce((s,d)=>s+d.total,0);

  document.getElementById('d-mkt').textContent='$'+fmt(mkt);
  document.getElementById('d-cost').textContent='$'+fmt(cost);
  const pctVal=cost>0?((mkt-cost)/cost*100):0;
  const dp=document.getElementById('d-pct'); dp.textContent=ps(pctVal)+fmt(pctVal,2)+'%'; dp.className='mono '+pc(pctVal);
  const up=document.getElementById('d-upnl'); up.textContent=ps(upnl)+'$'+fmt(upnl); up.className='mono '+pc(upnl);
  
  document.getElementById('d-yr').textContent='$'+fmt(divYr);
  document.getElementById('d-recv').textContent='$'+fmt(divRecv);

  updateLastQueryDisplay();
  // Notifications
  const notifs=[];
  S.holdings.forEach(h=>{
    const dm=getDivMonths(h);
    if(dm.includes(TM)&&!hasRecordedDivThisMonth(h.code))

// ── Draw donut pie chart ───────────────────────────────────────────────────────
function drawPie(){
  const canvas=document.getElementById('pie-canvas');
  if(!canvas||!S.holdings.length) return;
  // Selected slice pushes out slightly
  const PUSH=6, MARGIN=PUSH+6;
  const parent=document.getElementById('panel-chart')||canvas.parentElement;
  const parentW=parent?.clientWidth||300;
  // Canvas takes left half of panel (~panel minus 130px legend area), capped
  const displaySize=Math.min(Math.max(Math.floor(parentW-32-130), 100), 180);
  if(displaySize<=0) return;
  const dpr=Math.ceil(window.devicePixelRatio||1);
  const physW=Math.round(displaySize*dpr);
  const physH=Math.round(displaySize*dpr);
  if(canvas.width!==physW||canvas.height!==physH){
    canvas.width=physW;
    canvas.height=physH;
  }
  canvas.style.width=displaySize+'px';
  canvas.style.height=displaySize+'px';
  const ctx=canvas.getContext('2d');
  ctx.setTransform(dpr,0,0,dpr,0,0);
  const cx=displaySize/2, cy=displaySize/2;
  // Thin ring: inner radius is ~82% of outer → ring thickness ≈ 18% of radius
  const R=displaySize/2-MARGIN;
  const r=R*0.82;
  ctx.clearRect(0,0,displaySize,displaySize);

  const total=S.holdings.reduce((s,h)=>s+totalShares(h)*(getPrice(h.code)||avgPrice(h)),0);
  if(!total) return;
  const slices=S.holdings.map((h,i)=>({
    code:h.code,
    val:totalShares(h)*(getPrice(h.code)||avgPrice(h)),
    color:PIE_COLORS[i%PIE_COLORS.length],
    pct:totalShares(h)*(getPrice(h.code)||avgPrice(h))/total*100
  }));

  // Small gap between slices for clean separation
  const gap=0.025;

  // Draw ring slices — no labels on ring, no shadows on unselected
  let angle=-Math.PI/2;
  slices.forEach(sl=>{
    const sweep=Math.max(sl.val/total*Math.PI*2-gap, 0.002);
    const isSel=pieSelected===sl.code;
    const push=isSel?PUSH:0;
    const midA=angle+sweep/2+gap/2;
    const ox=Math.cos(midA)*push, oy=Math.sin(midA)*push;
    ctx.beginPath();
    ctx.arc(cx+ox, cy+oy, R, angle+gap/2, angle+gap/2+sweep);
    ctx.arc(cx+ox, cy+oy, r, angle+gap/2+sweep, angle+gap/2, true);
    ctx.closePath();
    // Selected slice is full opacity; others slightly muted
    ctx.fillStyle=isSel ? sl.color : sl.color+'cc';
    ctx.fill();
    angle+=sweep+gap;
  });

  // Centre: show just total market value (no "總市值" label — cleaner)
  const fs1=Math.round(displaySize*0.10); // value font
  const fs2=Math.round(displaySize*0.065); // label font
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.font=`400 ${fs2}px sans-serif`;
  ctx.fillText('總市值', cx, cy-fs1*0.55);
  ctx.fillStyle='#ffffff';
  ctx.font=`700 ${fs1}px sans-serif`;
  ctx.fillText('$'+fmt(total), cx, cy+fs2*0.4);
  ctx.textBaseline='alphabetic';

  // Legend — vertical list on right side
  const legend=document.getElementById('pie-legend');
  if(legend){
    legend.innerHTML=slices.map(sl=>`
      <div onclick="selectPieSlice('${sl.code}')" style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:5px 8px;border-radius:8px;background:${pieSelected===sl.code?'var(--bg3)':'transparent'}">
        <div style="width:10px;height:10px;border-radius:50%;background:${sl.color};flex-shrink:0"></div>
        <div style="min-width:0;line-height:1.3">
          <div style="font-size:13px;font-weight:700">${sl.code}</div>
          <div style="font-size:11px;color:var(--text3)">${fmt(sl.pct,2)}%</div>
        </div>
      </div>`).join('');
  }

  // Click/tap: detect ring hit and dispatch to correct slice
  canvas.onclick=null;
  canvas.onclick=function(e){
    const rect=canvas.getBoundingClientRect();
    const ex=(e.clientX-rect.left)*(displaySize/rect.width)-cx;
    const ey=(e.clientY-rect.top)*(displaySize/rect.height)-cy;
    const dist=Math.sqrt(ex*ex+ey*ey);
    // Allow click slightly inside inner radius and outside outer+push
    if(dist<r*0.85||dist>R+PUSH+6){pieSelected=null;rHoldings();return;}
    let a=Math.atan2(ey,ex)+Math.PI/2; if(a<0)a+=Math.PI*2;
    let ang=0;
    for(const sl of slices){
      const sweep=Math.max(sl.val/total*Math.PI*2-gap,0.002);
      if(a>=ang&&a<ang+sweep+gap){selectPieSlice(sl.code);return;}
      ang+=sweep+gap;
    }
    pieSelected=null; rHoldings();
  };
}

// ── Ledger ────────────────────────────────────────────────────────────────────
// Each entry: { id, type:'buy'|'sell'|'div', ... }
// Buy entries come from individual lots — each lot is a separate deletable entry
function rLedger(){
  const events=[];
  // Buys — one entry per lot
  S.holdings.forEach(h=>{
    (h.lots||[]).forEach(l=>{
      events.push({uid:`lot|${h.code}|${l.id}`,type:'buy',date:l.date,name:h.name,code:h.code,
        desc:`買入 ${fmt(l.shares)} 股 @ $${fmt(l.price,2)}`,
        amount:-(l.shares*l.price), shares:l.shares, price:l.price});
    });
  });
  // Sells
  S.sells.forEach(s=>{
    events.push({uid:`sell|${s.id}`,type:'sell',date:s.date,name:s.name,code:s.code,
      desc:`賣出 ${fmt(s.shares)} 股 @ $${fmt(s.sellPrice,2)}`,
      amount:s.shares*s.sellPrice, profit:s.profit});
  });
  // Dividends
  S.divHistory.forEach(d=>{
    events.push({uid:`div|${d.id}`,type:'div',date:d.date,name:d.name,code:d.code,
      desc:`股息 ${fmt(d.shares)}股 × $${fmt(d.perShare,3)}`,
      amount:d.total});
  });
  events.sort((a,b)=>new Date(b.date)-new Date(a.date));

  const totalIn=events.filter(e=>e.amount>0).reduce((s,e)=>s+e.amount,0);
  const totalOut=events.filter(e=>e.amount<0).reduce((s,e)=>s+Math.abs(e.amount),0);
  const net=totalIn-totalOut;
  

  const el=document.getElementById('ledger-list');
  if(!events.length){el.innerHTML='<div class="empty"><div class="empty-icon">📒</div>尚無紀錄</div>';return;}
  const ico={buy:'🔵',sell:'🔴',div:'💚'};
  const lbl={buy:'買入',sell:'賣出',div:'股息'};
  el.innerHTML=events.map(e=>`<div class="card2"><div class="row">
    <div style="display:flex;align-items:center;gap:8px;min-width:0">
      <span style="font-size:18px;flex-shrink:0">${ico[e.type]}</span>
      <div style="min-width:0">
        <div style="font-weight:700;font-size:14px">${e.name} <span style="font-size:11px;color:var(--text3);font-weight:400">${lbl[e.type]}</span></div>
        <div style="font-size:12px;color:var(--text3)">${e.desc}</div>
        <div style="font-size:11px;color:var(--text4)">${fmtD(e.date)}</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:2px;flex-shrink:0">
      <div style="text-align:right">
        <div class="mono" style="font-weight:700;color:${e.amount>=0?'var(--green)':'var(--red)'}">${e.amount>=0?'+':''}$${fmt(Math.abs(e.amount))}</div>
        ${e.profit!=null?`<div class="mono" style="font-size:11px;color:${e.profit>=0?'var(--green)':'var(--red)'}">${ps(e.profit)}$${fmt(e.profit)}</div>`:''}
      </div>
      <button onclick="delLedger('${e.uid}')" style="background:none;border:none;color:var(--text4);font-size:24px;padding:2px 8px;line-height:1;flex-shrink:0">×</button>
    </div>
  </div></div>`).join('');
}

function delLedger(uid){
  // Show confirm sheet instead of deleting immediately
  const parts=uid.split('|');
  const type=parts[0];
  let desc='這筆紀錄';
  if(type==='sell') desc='這筆賣出紀錄';
  else if(type==='div') desc='這筆股息紀錄';
  else if(type==='lot') desc='這筆買入紀錄';
  // Open confirm modal
  document.getElementById('modal-wrap').style.display='block';
  const s=document.getElementById('sheet');
  s.style.animation='none'; s.offsetHeight; s.style.animation='slideUp .28s ease';
  s.innerHTML=`
    <div style="text-align:center;padding:12px 0 8px">
      <div style="font-size:40px;margin-bottom:12px">🗑</div>
      <div style="font-weight:800;font-size:18px;margin-bottom:8px">確認刪除？</div>
      <div style="font-size:14px;color:var(--text3);margin-bottom:24px">刪除${desc}後無法復原</div>
      <button class="btn btn-red" onclick="confirmDelLedger('${uid}')" style="margin-bottom:10px">確認刪除</button>
      <button class="btn btn-gray" onclick="closeModal()">取消</button>
    </div>`;
}

function confirmDelLedger(uid){
  const [type,a,b]=uid.split('|');
  if(type==='sell'){
    S.sells=S.sells.filter(s=>s.id!==parseInt(a));
  } else if(type==='div'){
    S.divHistory=S.divHistory.filter(d=>d.id!==parseInt(a));
  } else if(type==='lot'){
    const code=a, lotId=parseInt(b);
    const h=S.holdings.find(hh=>hh.code===code);
    if(!h){ closeModal(); return; }
    const newLots=h.lots.filter(l=>l.id!==lotId);
    if(!newLots.length){
      S.holdings=S.holdings.filter(hh=>hh.code!==code);
    } else {
      S.holdings=S.holdings.map(hh=>hh.code===code?{...hh,lots:newLots}:hh);
    }
  }
  save(); closeModal(); renderAll(); toast('已刪除');
}

// ── Sparkline ─────────────────────────────────────────────────────────────────
function drawSparkline(){
  const snaps=S.mktSnaps;
  const canvas=document.getElementById('sparkline');
  const empty=document.getElementById('spark-empty');
  const tbl=document.getElementById('spark-table');
  if(!canvas) return;
  if(snaps.length<2){
    canvas.style.display='none'; empty.style.display='block';
    if(tbl) tbl.style.display='none';
    return;
  }
  canvas.style.display='block'; empty.style.display='none';
  // Force layout so offsetWidth is correct even on hidden page
  const W=canvas.parentElement.clientWidth-32||300, H=110;
  canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);
  const vals=snaps.map(s=>s.value);
  const mn=Math.min(...vals)*0.995, mx=Math.max(...vals)*1.005, range=mx-mn||1;
  const pts=snaps.map((s,i)=>({x:snaps.length>1?i/(snaps.length-1)*W:W/2,y:H-(s.value-mn)/range*(H-28)-14}));
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'rgba(10,132,255,0.4)'); grad.addColorStop(1,'rgba(10,132,255,0)');
  ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y); pts.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath(); ctx.fillStyle=grad; ctx.fill();
  ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y); pts.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.strokeStyle='#0a84ff'; ctx.lineWidth=2.5; ctx.stroke();
  const pct=((vals[vals.length-1]-vals[0])/vals[0]*100);
  ctx.fillStyle=pct>=0?'#30d158':'#ff453a'; ctx.font='bold 15px sans-serif'; ctx.textAlign='center';
  ctx.fillText((pct>=0?'+':'')+fmt(pct,2)+'%', W/2, 14);
  ctx.fillStyle='#8e8e93'; ctx.font='11px sans-serif';
  ctx.fillText('$'+fmt(vals[vals.length-1]), W/2, 28);
  ctx.textAlign='left'; ctx.fillText(snaps[0].date.slice(5),4,H-3);
  ctx.textAlign='right'; ctx.fillText(snaps[snaps.length-1].date.slice(5),W-4,H-3);
  // Recent snapshots table
  if(tbl){
    tbl.style.display='block';
    const recent=snaps.slice(-5).reverse();
    tbl.innerHTML='<div style="font-size:11px;color:var(--text3);margin-bottom:6px">近期快照</div>'+
      recent.map((s,i)=>{
        const prev=i<recent.length-1?recent[i+1].value:s.value;
        const chg=s.value-prev, pp=prev?(chg/prev*100):0;
        return `<div style="display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid var(--border)">
          <span style="color:var(--text3)">${s.date}</span>
          <span class="mono" style="font-weight:600">$${fmt(s.value)}</span>
          <span class="mono" style="color:${chg>=0?'var(--green)':'var(--red)'};font-size:11px">${i===recent.length-1?'—':((chg>=0?'+':'')+fmt(pp,2)+'%')}</span>
        </div>`;
      }).join('');
  }
}
function rSparkline(){
  // Defer draw so canvas has correct dimensions whether page is visible or not
  requestAnimationFrame(()=>requestAnimationFrame(drawSparkline));
}

// ── Shared helpers ────────────────────────────────────────────────────────────
async function _fetchPrices(codes, cb){
  const updAt=new Date().toISOString();
  const foundSym={};
  const allSyms=[...codes.map(c=>c+'.TW'),...codes.map(c=>c+'.TWO')].join(',');
  let ok=false;
  try{
    const burl='https://query1.finance.yahoo.com/v7/finance/quote?symbols='+encodeURIComponent(allSyms)+'&fields=regularMarketPrice,shortName,longName&_='+cb;
    const r=await fetch('https://api.allorigins.win/get?url='+encodeURIComponent(burl));
    const quotes=JSON.parse((await r.json()).contents)?.quoteResponse?.result||[];
    for(const q of quotes){
      if(!q.regularMarketPrice) continue;
      const code=q.symbol.replace(/[.](TW|TWO)$/,'');
      if(!codes.includes(code)||foundSym[code]) continue;
      const price=Math.round(q.regularMarketPrice*100)/100;
      const name=q.shortName||q.longName||code;
      if(!S.stockInfo[code]) S.stockInfo[code]={};
      S.stockInfo[code]={...S.stockInfo[code],name,price,updAt};
      S.holdings=S.holdings.map(hh=>hh.code===code?{...hh,name}:hh);
      foundSym[code]=q.symbol;
    }
    if(Object.keys(foundSym).length) ok=true;
  }catch{}
  if(!ok){
    for(const code of codes){
      for(const suf of['.TW','.TWO']){
        try{
          const url='https://query1.finance.yahoo.com/v8/finance/chart/'+code+suf+'?interval=1d&range=2d&_='+cb;
          const r=await fetch('https://api.allorigins.win/get?url='+encodeURIComponent(url));
          const meta=JSON.parse((await r.json()).contents)?.chart?.result?.[0]?.meta;
          if(meta?.regularMarketPrice){
            const price=Math.round(meta.regularMarketPrice*100)/100;
            const name=meta.shortName||meta.longName||code;
            if(!S.stockInfo[code]) S.stockInfo[code]={};
            S.stockInfo[code]={...S.stockInfo[code],name,price,updAt};
            S.holdings=S.holdings.map(hh=>hh.code===code?{...hh,name}:hh);
            foundSym[code]=code+suf; break;
          }
        }catch{}
      }
    }
  }
  return foundSym;
}

async function _fetchDivs(foundSym, cb){
  let divOk=0;
  await Promise.all(Object.entries(foundSym).map(async([code,sym])=>{
    try{
      const du='https://query1.finance.yahoo.com/v8/finance/chart/'+sym+'?interval=3mo&range=2y&events=dividends&_='+cb;
      const dr=await fetch('https://api.allorigins.win/get?url='+encodeURIComponent(du));
      const evts=JSON.parse((await dr.json()).contents)?.chart?.result?.[0]?.events?.dividends;
      if(!evts) return;
      const months=[...new Set(Object.values(evts).map(e=>new Date(e.date*1000).getMonth()+1))].sort((a,b)=>a-b);
      if(!months.length) return;
      S.stockInfo[code].divMonths=months;
      const sorted=Object.values(evts).sort((a,b)=>b.date-a.date);
      if(sorted.length) S.stockInfo[code].lastDivAmt=Math.round(sorted[0].amount*1000)/1000;
      S.holdings=S.holdings.map(hh=>{
        if(hh.code!==code||hh._manual) return hh;
        return{...hh,divMonths:months};
      });
      divOk++;
    }catch{}
  }));
  return divOk;
}

// ── Price-only query (dashboard button) ───────────────────────────────────────
async function queryPriceOnly(){
  if(!S.holdings.length){toast('請先新增持股');return;}
  const btn=document.getElementById('ai-btn'), msg=document.getElementById('ai-msg');
  btn.disabled=true; btn.innerHTML='<span class="spin">⟳</span>'; msg.textContent='查詢股價中...';
  const cb=Date.now(), codes=S.holdings.map(h=>h.code.trim());
  const foundSym=await _fetchPrices(codes,cb);
  const priceOk=Object.keys(foundSym).length;
  // Save query time and data date
  S.lastQueryTime=new Date().toISOString();
  // lastDataDate: derive from regularMarketTime stored in stockInfo (TWN date)
  const codes2=S.holdings.map(h=>h.code.trim());
  for(const code of codes2){
    const info=S.stockInfo[code];
    if(info?.marketTime){
      const d=new Date((info.marketTime)*1000+8*3600*1000);
      S.lastDataDate=d.toISOString().slice(0,10);
      break;
    }
  }
  // Always set lastDataDate to TWN today when query succeeds
  if(priceOk>0){
    const twnNow=new Date(Date.now()+8*3600*1000);
    S.lastDataDate=twnNow.toISOString().slice(0,10);
  }
  snap(); save(); renderAll();
  if(priceOk>0){
    msg.textContent='✓ 股價更新 '+priceOk+' 支 · '+new Date().toLocaleTimeString('zh-TW');
    const upEl=document.getElementById('ai-updated');
    upEl.style.display='block'; upEl.textContent='如需更新配息月，至「持股」頁按「↻ 更新配息」';
    toast('✓ 股價更新完成');
  } else {
    msg.textContent='⚠ 查詢失敗，請確認網路後重試'; toast('查詢失敗');
  }
  btn.disabled=false; btn.textContent='查詢';
}

// ── Dividend-only query (holdings page button) ────────────────────────────────
async function queryDivOnly(){
  if(!S.holdings.length){toast('請先新增持股');return;}

}

// ── Actions ───────────────────────────────────────────────────────────────────
function doAddHolding(){
  const codeEl=document.getElementById('f-code');
  const code=(codeEl?codeEl.value:selH?.code)?.trim().toUpperCase();
  const shares=parseFloat(document.getElementById('f-shares').value);
  const price=parseFloat(document.getElementById('f-price').value);
  if(!code||isNaN(shares)||isNaN(price)||shares<=0||price<=0){toast('請填寫所有欄位');return;}
  const lot={id:Date.now(),shares,price,date:new Date().toISOString()};
  const existing=S.holdings.find(h=>h.code===code);
  if(existing){
    S.holdings=S.holdings.map(h=>h.code===code?{...h,lots:[...(h.lots||[]),lot]}:h);
  } else {
    const name=S.stockInfo[code]?.name||code;
    S.holdings.push({code,name,lots:[lot],divMonths:[]});
  }
  save();closeModal();renderAll();toast('✓ 新增完成');
}

function doSell(){
  const h=selH;
  const shares=parseFloat(document.getElementById('f-sell-sh').value);
  const sellPrice=parseFloat(document.getElementById('f-sell-pr').value);
  const ts=totalShares(h);
  if(isNaN(shares)||isNaN(sellPrice)||shares<=0||shares>ts){toast('請檢查輸入值');return;}
  // FIFO: consume lots from oldest first
  const ap=avgPrice(h); // weighted avg of all current lots
  const profit=(sellPrice-ap)*shares;
  // Remove shares from lots (FIFO)
  let remaining=shares;
  let newLots=[...(h.lots||[])].sort((a,b)=>new Date(a.date)-new Date(b.date));
  const consumed=[];
  for(let i=0;i<newLots.length&&remaining>0;i++){
    const take=Math.min(newLots[i].shares,remaining);
    consumed.push({shares:take,price:newLots[i].price});
    newLots[i]={...newLots[i],shares:newLots[i].shares-take};
    remaining-=take;
  }
  newLots=newLots.filter(l=>l.shares>0);
  S.sells.unshift({id:Date.now(),code:h.code,name:h.name,shares,sellPrice,avgCost:ap,profit,date:new Date().toISOString()});
  if(!newLots.length) S.holdings=S.holdings.filter(hh=>hh.code!==h.code);
  else S.holdings=S.holdings.map(hh=>hh.code===h.code?{...hh,lots:newLots}:hh);
  save();closeModal();renderAll();toast('✓ 賣出完成');
}

function doDiv(){
  const h=selH;
  const raw=document.getElementById('f-div-per').value;
  const perShare=parseFloat(raw);
  const date=document.getElementById('f-div-date').value;
  if(raw===''||isNaN(perShare)||perShare<0){toast('請輸入每股股息（可填 0）');return;}
  const ts=totalShares(h);
  const period=`${NOW.getFullYear()}-${String(TM).padStart(2,'0')}`;
  S.divHistory.unshift({id:Date.now(),code:h.code,name:h.name,perShare,shares:ts,total:perShare*ts,date,period});
  if(!S.stockInfo[h.code]) S.stockInfo[h.code]={};
  S.stockInfo[h.code].lastDivAmt=perShare;
  save();closeModal();renderAll();toast('✓ 股息記錄完成');
}

function doImport(event){
  const file=event.target.files[0];
  if(!file){return;}
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const imp=JSON.parse(e.target.result);
      if(!imp.holdings) throw new Error('格式錯誤');
      mergeImport(imp);
      toast('✓ 匯入完成');
      renderAll();
    }catch(err){
      toast('⚠ 匯入失敗：檔案格式錯誤');
    }
    event.target.value=''; // reset input
  };
  reader.readAsText(file);
}

function mergeImport(imp){
  // ── Holdings: merge by code, merge lots by id ──────────────────────
  const impHoldings=imp.holdings||[];
  impHoldings.forEach(ih=>{
    const existing=S.holdings.find(h=>h.code===ih.code);
    if(!existing){
      // New stock not on this device — add it fully
      S.holdings.push({...ih, _manual:ih._manual||false});
    } else {
      // Merge lots by id (timestamp-based, no duplicates)
      const existingLotIds=new Set((existing.lots||[]).map(l=>l.id));
      const newLots=(ih.lots||[]).filter(l=>!existingLotIds.has(l.id));
      existing.lots=[...(existing.lots||[]),...newLots];
      // divMonths: keep manual override, else prefer imported
      if(!existing._manual && ih.divMonths&&ih.divMonths.length>0){
        existing.divMonths=ih.divMonths;
        existing._manual=ih._manual||false;
      }
      // _manual flag: if either side is manual, keep manual
      if(ih._manual) existing._manual=true;
    }
  });

  // ── Sells: merge by id ────────────────────────────────────────────
  const existingSellIds=new Set(S.sells.map(s=>s.id));
  const newSells=(imp.sells||[]).filter(s=>!existingSellIds.has(s.id));
  S.sells=[...S.sells,...newSells].sort((a,b)=>new Date(b.date)-new Date(a.date));

  // ── Div history: merge by id ──────────────────────────────────────
  const existingDivIds=new Set(S.divHistory.map(d=>d.id));
  const newDivs=(imp.divHistory||[]).filter(d=>!existingDivIds.has(d.id));
  S.divHistory=[...S.divHistory,...newDivs].sort((a,b)=>new Date(b.date)-new Date(a.date));

  // ── StockInfo: merge; manual divMonths on this device take priority ──
  const impInfo=imp.stockInfo||{};
  Object.entries(impInfo).forEach(([code,info])=>{
    if(!S.stockInfo[code]){
      S.stockInfo[code]={...info};
    } else {
      // Keep price if imported is newer
      const localUp=S.stockInfo[code].updatedAt||'';
      const impUp=info.updatedAt||'';
      if(impUp>localUp) S.stockInfo[code].price=info.price;
      // divMonths: only overwrite if local holding is NOT manually set
      const localH=S.holdings.find(h=>h.code===code);
      if(!localH?._manual && info.divMonths&&info.divMonths.length>0){
        S.stockInfo[code].divMonths=info.divMonths;
      }
      if(info.lastDivAmt!=null&&S.stockInfo[code].lastDivAmt==null){
        S.stockInfo[code].lastDivAmt=info.lastDivAmt;
      }
    }
  });

  // ── mktSnaps: merge by date, take max value ───────────────────────
  const snapMap={};
  [...S.mktSnaps,...(imp.mktSnaps||[])].forEach(s=>{
    if(!snapMap[s.date]||s.value>snapMap[s.date]) snapMap[s.date]=s.value;
  });
  S.mktSnaps=Object.entries(snapMap).map(([date,value])=>({date,value})).sort((a,b)=>a.date.localeCompare(b.date)).slice(-90);

  // ── Holidays: merge by year ───────────────────────────────────────
  const impHol=imp.holidays||{};
  Object.entries(impHol).forEach(([yr,dates])=>{
    if(!S.holidays[yr]) S.holidays[yr]=dates;
  });

  // ── Last query time: keep most recent ────────────────────────────
  if(imp.lastQueryTime&&(!S.lastQueryTime||imp.lastQueryTime>S.lastQueryTime)){
    S.lastQueryTime=imp.lastQueryTime;
    S.lastDataDate=imp.lastDataDate||S.lastDataDate;
  }

  save();
}

// ── Draw chart with crosshair support ────────────────────────────────────────
function sqDrawChart(range){
  requestAnimationFrame(()=>{
    const canvas=document.getElementById('sq-spark');
    if(!canvas) return;
    const pricePoints=sqState.allPoints[range]||[];
    const datesEl=document.getElementById('sq-spark-dates');
    const tipEl=document.getElementById('sq-tooltip');
    if(datesEl&&pricePoints.length>=2){
      datesEl.innerHTML=`<span>${new Date(pricePoints[0].x*1000).toLocaleDateString('zh-TW',{month:'2-digit',day:'2-digit'})}</span><span>${new Date(pricePoints[pricePoints.length-1].x*1000).toLocaleDateString('zh-TW',{month:'2-digit',day:'2-digit'})}</span>`;
    }
    if(!pricePoints.length){canvas.style.display='none';return;}
    canvas.style.display='block';
    const W=canvas.parentElement.clientWidth-28||300;
    const H=100;
    const dpr=Math.ceil(window.devicePixelRatio||1);
    if(canvas.width!==W*dpr||canvas.height!==H*dpr){
      canvas.width=W*dpr; canvas.height=H*dpr;
      canvas.style.width=W+'px'; canvas.style.height=H+'px';
    }
    const ctx=canvas.getContext('2d');
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.clearRect(0,0,W,H);

    const vals=pricePoints.map(p=>p.y);
    const mn=Math.min(...vals)*0.999, mx=Math.max(...vals)*1.001, rng=mx-mn||1;
    const toX=i=>pricePoints.length>1?i/(pricePoints.length-1)*(W-4)+2:W/2;
    const toY=v=>H-4-(v-mn)/rng*(H-12);
    const pts=pricePoints.map((p,i)=>({x:toX(i),y:toY(p.y),ts:p.x,val:p.y}));

    const isUp=vals[vals.length-1]>=vals[0];
    const lineColor=isUp?'#30d158':'#ff453a';
    const grad=ctx.createLinearGradient(0,0,0,H);
    grad.addColorStop(0,isUp?'rgba(48,209,88,0.22)':'rgba(255,69,58,0.22)');
    grad.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y);
    pts.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));
    ctx.lineTo(pts[pts.length-1].x,H); ctx.lineTo(pts[0].x,H); ctx.closePath();
    ctx.fillStyle=grad; ctx.fill();
    ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y);
    pts.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));
    ctx.strokeStyle=lineColor; ctx.lineWidth=2; ctx.stroke();
    const last=pts[pts.length-1];
    ctx.beginPath(); ctx.arc(last.x,last.y,4,0,Math.PI*2);
    ctx.fillStyle=lineColor; ctx.fill();

    // Store pts for crosshair
    canvas._pts=pts; canvas._ctx=ctx; canvas._W=W; canvas._H=H;
    canvas._lineColor=lineColor; canvas._mn=mn; canvas._rng=rng;
    canvas._dpr=dpr; canvas._pricePoints=pricePoints;
    canvas._vals=vals;

    // Crosshair handlers
    function drawCrosshair(clientX,clientY){
      const rect=canvas.getBoundingClientRect();
      const x=(clientX-rect.left)*(W/rect.width);
      // Find nearest point
      let nearest=pts[0], nd=Infinity;
      pts.forEach(p=>{const d=Math.abs(p.x-x);if(d<nd){nd=d;nearest=p;}});
      // Redraw
      ctx.setTransform(dpr,0,0,dpr,0,0);
      ctx.clearRect(0,0,W,H);
      // Redraw fill + line
      const g2=ctx.createLinearGradient(0,0,0,H);
      g2.addColorStop(0,isUp?'rgba(48,209,88,0.22)':'rgba(255,69,58,0.22)');
      g2.addColorStop(1,'rgba(0,0,0,0)');
      ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y);
      pts.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));
      ctx.lineTo(pts[pts.length-1].x,H); ctx.lineTo(pts[0].x,H); ctx.closePath();
      ctx.fillStyle=g2; ctx.fill();
      ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y);
      pts.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));
      ctx.strokeStyle=lineColor; ctx.lineWidth=2; ctx.stroke();
      // Vertical crosshair line
      ctx.beginPath(); ctx.setLineDash([3,3]);
      ctx.moveTo(nearest.x,0); ctx.lineTo(nearest.x,H);
      ctx.strokeStyle='rgba(255,255,255,0.4)'; ctx.lineWidth=1; ctx.stroke();
      ctx.setLineDash([]);
      // Circle on nearest point
      ctx.beginPath(); ctx.arc(nearest.x,nearest.y,5,0,Math.PI*2);
      ctx.fillStyle='#fff'; ctx.fill();
      ctx.beginPath(); ctx.arc(nearest.x,nearest.y,3,0,Math.PI*2);
      ctx.fillStyle=lineColor; ctx.fill();
      // Tooltip
      const d=new Date(nearest.ts*1000);
      const dateStr=d.toLocaleDateString('zh-TW',{month:'2-digit',day:'2-digit'});
      if(tipEl) tipEl.innerHTML=`<span style="font-size:13px;font-weight:700;color:#fff">${dateStr} &nbsp; <span style="color:${lineColor}">$${fmt(nearest.val,2)}</span></span>`;
    }
    function clearCrosshair(){
      // Redraw cleanly
      ctx.setTransform(dpr,0,0,dpr,0,0);
      ctx.clearRect(0,0,W,H);
      const g2=ctx.createLinearGradient(0,0,0,H);
      g2.addColorStop(0,isUp?'rgba(48,209,88,0.22)':'rgba(255,69,58,0.22)');
      g2.addColorStop(1,'rgba(0,0,0,0)');
      ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y);
      pts.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));
      ctx.lineTo(pts[pts.length-1].x,H); ctx.lineTo(pts[0].x,H); ctx.closePath();
      ctx.fillStyle=g2; ctx.fill();
      ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y);
      pts.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));
      ctx.strokeStyle=lineColor; ctx.lineWidth=2; ctx.stroke();
      ctx.beginPath(); ctx.arc(last.x,last.y,4,0,Math.PI*2);
      ctx.fillStyle=lineColor; ctx.fill();
      if(tipEl) tipEl.innerHTML='<span style="font-size:11px;color:var(--text4)">長按後左右滑動查看各日價格</span>';
    }
    // Touch events for crosshair (long press + drag)
    let touching=false, longPressTimer=null;
    canvas.ontouchstart=e=>{
      e.preventDefault();
      longPressTimer=setTimeout(()=>{touching=true;drawCrosshair(e.touches[0].clientX,e.touches[0].clientY);},300);
    };
    canvas.ontouchmove=e=>{
      e.preventDefault();
      if(touching) drawCrosshair(e.touches[0].clientX,e.touches[0].clientY);
    };
    canvas.ontouchend=e=>{
      e.preventDefault();
      clearTimeout(longPressTimer);
      if(touching){touching=false;setTimeout(clearCrosshair,1500);}
    };
    // Mouse for desktop
    canvas.onmousedown=e=>{touching=true;drawCrosshair(e.clientX,e.clientY);};
    canvas.onmousemove=e=>{if(touching)drawCrosshair(e.clientX,e.clientY);};
    canvas.onmouseup=()=>{touching=false;setTimeout(clearCrosshair,1500);};
    canvas.onmouseleave=()=>{if(touching){touching=false;clearCrosshair();}};
  });
}
