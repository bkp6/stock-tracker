<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="存股追蹤">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23000'/%3E%3Ctext y='.9em' font-size='72' x='12'%3E📈%3C/text%3E%3C/svg%3E">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" id="pwa-manifest">
<title>存股追蹤器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#000;--bg2:#1c1c1e;--bg3:#2c2c2e;--text:#fff;--text2:#ebebf5cc;--text3:#8e8e93;--text4:#48484a;--blue:#0a84ff;--green:#30d158;--red:#ff453a;--yellow:#ffd60a;--purple:#bf5af2;--border:#38383a;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',-apple-system,sans-serif;min-height:100%;overflow-x:hidden;}
::-webkit-scrollbar{display:none;}
input,select{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:13px 14px;border-radius:10px;font-family:inherit;font-size:16px;width:100%;outline:none;-webkit-appearance:none;appearance:none;}
input:focus{border-color:var(--blue);}input::placeholder{color:var(--text4);}input[type="date"]{color-scheme:dark;}
button{cursor:pointer;font-family:inherit;border:none;-webkit-appearance:none;}
.mono{font-variant-numeric:tabular-nums;}
.card{background:var(--bg2);border-radius:16px;padding:16px;margin-bottom:12px;}
.card2{background:var(--bg3);border-radius:12px;padding:14px;margin-bottom:8px;}
.btn{border-radius:12px;padding:14px 0;font-size:16px;font-weight:600;width:100%;transition:opacity .15s;display:block;text-align:center;}.btn:active{opacity:.6;}
.btn-blue{background:var(--blue);color:#fff;}.btn-red{background:var(--red);color:#fff;}.btn-green{background:var(--green);color:#fff;}.btn-gray{background:var(--bg3);color:var(--text);}
.btn-sm{border-radius:8px;padding:7px 11px;font-size:13px;font-weight:600;transition:opacity .15s;white-space:nowrap;}.btn-sm:active{opacity:.6;}
.row{display:flex;align-items:center;justify-content:space-between;}
.label{font-size:13px;color:var(--text3);margin-bottom:7px;}
.sec{font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin:20px 0 10px;}
.chip{background:var(--bg3);border-radius:8px;padding:3px 9px;font-size:12px;color:var(--text3);display:inline-block;}
.pill{border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;display:inline-block;}
.month-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px;}
.month-btn{padding:8px 4px;border-radius:8px;font-size:13px;font-weight:600;background:var(--bg3);color:var(--text3);border:1px solid var(--border);cursor:pointer;font-family:inherit;transition:all .15s;}
.month-btn.on{background:var(--blue);color:#fff;border-color:var(--blue);}
#nav{position:fixed;bottom:0;left:0;right:0;background:rgba(28,28,30,.98);border-top:1px solid var(--border);display:flex;padding:8px 0;padding-bottom:calc(8px + env(safe-area-inset-bottom,0px));z-index:100;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--text3);font-size:10px;font-family:inherit;padding:4px 0;transition:color .15s;}
.nav-btn.active{color:var(--blue);}.nav-icon{font-size:22px;line-height:1;}
/* Extra bottom padding ensures last card clears nav bar */
#app{padding-left:16px;padding-right:16px;padding-bottom:calc(env(safe-area-inset-bottom,0px) + 140px);max-width:430px;margin:0 auto;padding-top:100px;}
.page{display:none;}.page.active{display:block;animation:fadeIn .2s ease;}
#header{position:fixed;top:0;left:0;right:0;padding:calc(env(safe-area-inset-top,44px)+10px) 20px 12px;background:rgba(0,0,0,.98);z-index:50;}
#modal-wrap{position:fixed;inset:0;z-index:200;}
#overlay{position:absolute;inset:0;background:rgba(0,0,0,.65);}
#sheet{position:absolute;bottom:0;left:0;right:0;background:var(--bg2);border-radius:20px 20px 0 0;padding:20px;padding-bottom:calc(32px + env(safe-area-inset-bottom,0px));max-height:90vh;overflow-y:auto;}
.alert-card{background:#30d15818;border:1px solid var(--green);border-radius:14px;padding:13px 15px;margin-bottom:8px;}
.warn-card{background:#ffd60a18;border:1px solid var(--yellow);border-radius:14px;padding:13px 15px;margin-bottom:8px;}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
.pos{color:var(--green)!important;}.neg{color:var(--red)!important;}.zer{color:var(--text3)!important;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.empty{text-align:center;padding:50px 0;color:var(--text4);}
.empty-icon{font-size:44px;margin-bottom:12px;}
.sl{font-size:11px;color:var(--text3);margin-bottom:3px;}.sv{font-size:13px;font-weight:600;}
.spin{display:inline-block;animation:spin 1s linear infinite;}@keyframes spin{to{transform:rotate(360deg)}}
#toast{position:fixed;top:calc(env(safe-area-inset-top,44px)+70px);left:50%;transform:translateX(-50%);background:var(--bg3);color:var(--text);padding:10px 20px;border-radius:20px;font-size:14px;z-index:300;display:none;white-space:nowrap;border:1px solid var(--border);}
</style>
</head>
<body>
<div id="header">
  <div style="font-size:24px;font-weight:900;letter-spacing:-0.5px">存股追蹤</div>
  <div id="header-date" style="font-size:12px;color:var(--text3);margin-top:2px"></div>
</div>
<div id="toast"></div>
<div id="app">

<!-- DASHBOARD -->
<div class="page active" id="page-dashboard">
  <div class="card" style="background:linear-gradient(135deg,#0a84ff18,#30d15818);border:1px solid #0a84ff33">
    <div style="font-size:13px;color:var(--text3);margin-bottom:4px">持股市值</div>
    <div class="mono" id="d-mkt" style="font-size:38px;font-weight:900">$0</div>
    <div style="display:flex;gap:20px;margin-top:10px;flex-wrap:wrap">
      <div><div style="font-size:11px;color:var(--text3)">總成本</div><div class="mono" id="d-cost" style="font-weight:700">$0</div></div>
      <div><div style="font-size:11px;color:var(--text3)">未實現損益</div><div class="mono" id="d-upnl" style="font-weight:700">$0</div></div>
      <div><div style="font-size:11px;color:var(--text3)">已實現損益</div><div class="mono" id="d-rpnl" style="font-weight:700">$0</div></div>
    </div>
  </div>
  <div class="grid2" style="margin-bottom:12px">
    <div class="card" style="background:#ffd60a18;border:1px solid #ffd60a33;margin-bottom:0"><div style="font-size:11px;color:var(--text3);margin-bottom:4px">年度預估股息</div><div class="mono" id="d-yr" style="font-size:22px;font-weight:800;color:var(--yellow)">$0</div></div>
    <div class="card" style="background:#bf5af218;border:1px solid #bf5af233;margin-bottom:0"><div style="font-size:11px;color:var(--text3);margin-bottom:4px">累計收到股息</div><div class="mono" id="d-recv" style="font-size:22px;font-weight:800;color:var(--purple)">$0</div></div>
  </div>
  <!-- Query card -->
  <div class="card">
    <div class="row">
      <div><div style="font-weight:700;font-size:15px">股價 &amp; 配息月查詢</div><div id="ai-msg" style="font-size:12px;color:var(--text3);margin-top:2px">同步查詢台股股價、配息月、美股指數</div></div>
      <button class="btn btn-blue" onclick="queryAll()" id="ai-btn" style="width:72px;padding:10px 0;font-size:14px;border-radius:10px">查詢</button>
    </div>
    <div id="ai-updated" style="font-size:11px;color:var(--text4);margin-top:8px;display:none"></div>
    <!-- US indices inline -->
    <div id="us-inline" style="display:none;margin-top:12px;border-top:1px solid var(--border);padding-top:12px">
      <div style="font-size:12px;color:var(--text3);margin-bottom:8px;font-weight:600">美股指數</div>
      <div id="us-data"></div>
    </div>
  </div>
  <!-- Notifications below query card -->
  <div id="notif-area"></div>
  <div class="sec">持股快覽</div>
  <div id="d-holdings"></div>
</div>

<!-- HOLDINGS -->
<div class="page" id="page-holdings">
  <div class="row" style="margin-bottom:16px"><div style="font-size:22px;font-weight:900">我的持股</div><button class="btn-sm btn-blue" onclick="openModal('addHolding')" style="color:#fff">＋ 新增</button></div>
  <div id="h-list"></div>
</div>

<!-- DIVIDENDS -->
<div class="page" id="page-dividends">
  <div style="font-size:22px;font-weight:900;margin-bottom:4px">股息紀錄</div>
  <div style="font-size:13px;color:var(--text3);margin-bottom:16px">累計收到 <span class="mono" id="div-total" style="color:var(--purple);font-weight:700">$0</span></div>
  <div class="sec">月曆（點選查看詳情）</div>
  <div class="grid4" id="div-cal" style="margin-bottom:12px"></div>
  <div id="div-detail" style="display:none;margin-bottom:12px"></div>
  <div class="sec">入帳明細</div>
  <div id="div-list"></div>
</div>

<!-- LEDGER -->
<div class="page" id="page-ledger">
  <div style="font-size:22px;font-weight:900;margin-bottom:4px">帳本</div>
  <div style="font-size:13px;color:var(--text3);margin-bottom:16px">所有買入、賣出、股息，可單獨刪除每筆</div>
  <div id="ledger-sum" style="margin-bottom:12px"></div>
  <div id="ledger-list"></div>
</div>

<!-- MARKET -->
<div class="page" id="page-market">
  <div style="font-size:22px;font-weight:900;margin-bottom:16px">市場概況</div>
  <div class="card">
    <div style="font-weight:700;font-size:15px;margin-bottom:4px">持股市值走勢</div>
    <div style="font-size:12px;color:var(--text3);margin-bottom:12px">每次查詢後自動記錄快照</div>
    <canvas id="sparkline" height="110" style="width:100%;display:block"></canvas>
    <div id="spark-empty" style="text-align:center;padding:30px 0;color:var(--text4);display:none">尚無資料，按總覽「查詢」後開始記錄</div>
  </div>
  <div class="sec">美股指數</div>
  <div id="mkt-us"><div style="text-align:center;padding:20px;color:var(--text4)">按「重新整理」載入</div></div>
  <button class="btn btn-gray" onclick="loadUSMarket('mkt-us')" id="mkt-btn" style="margin-top:8px">重新整理</button>
</div>

</div><!-- /app -->

<nav id="nav">
  <button class="nav-btn active" onclick="switchTab('dashboard')" id="nav-dashboard"><span class="nav-icon">📊</span><span>總覽</span></button>
  <button class="nav-btn" onclick="switchTab('holdings')" id="nav-holdings"><span class="nav-icon">💼</span><span>持股</span></button>
  <button class="nav-btn" onclick="switchTab('dividends')" id="nav-dividends"><span class="nav-icon">💰</span><span>股息</span></button>
  <button class="nav-btn" onclick="switchTab('ledger')" id="nav-ledger"><span class="nav-icon">📒</span><span>帳本</span></button>
  <button class="nav-btn" onclick="switchTab('market')" id="nav-market"><span class="nav-icon">🌐</span><span>市場</span></button>
</nav>

<div id="modal-wrap" style="display:none">
  <div id="overlay" onclick="closeModal()"></div>
  <div id="sheet"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════════
// STATE
// holdings : { code, name, shares, lots:[{id,shares,price,date}], divMonths:[], _manual:bool }
//   → avgPrice is COMPUTED from active lots, never stored directly
// sells    : { id, code, name, lots:[{shares,price}], sellPrice, profit, date }
//   → profit = (sellPrice - weightedAvgCost) * totalShares  (FIFO)
// divHistory: { id, code, name, perShare, shares, total, date, period }
// stockInfo : { [code]: { name, price, divMonths, lastDivAmt, updatedAt } }
// mktSnaps  : [{ date, value }]
// ═══════════════════════════════════════════════════════════════════════════════
let S = { holdings:[], sells:[], divHistory:[], stockInfo:{}, mktSnaps:[] };
let modal=null, selH=null, tempM=[], selMonth=null;

// ── Persistence ───────────────────────────────────────────────────────────────
function save(){ localStorage.setItem('stk6', JSON.stringify(S)); }
function load(){
  try{ const d=localStorage.getItem('stk6'); if(d) S={...S,...JSON.parse(d)}; } catch{}
  // Migrate from older keys — preserve existing data
  if(!localStorage.getItem('stk6')){
    for(const k of ['stdv5','stdv4','stdv3']){
      try{
        const raw=localStorage.getItem(k);
        if(!raw) continue;
        const old=JSON.parse(raw);
        // Re-build holdings to ensure lots have IDs
        if(old.holdings) old.holdings=old.holdings.map(h=>{
          const lots=(h.lots||[]).map((l,i)=>({id:l.id||Date.now()+i,shares:l.shares,price:l.price,date:l.date}));
          return {...h, lots, divMonths:h.divMonths||[]};
        });
        S={...S,...old};
        if(!S.mktSnaps) S.mktSnaps=[];
        save(); break;
      }catch{}
    }
  }
  if(!S.mktSnaps) S.mktSnaps=[];
  // Ensure all lots have IDs
  S.holdings=S.holdings.map(h=>({...h,lots:(h.lots||[]).map((l,i)=>({...l,id:l.id||(Date.now()+i)}))}));
}

// ── Computed helpers ──────────────────────────────────────────────────────────
const NOW=new Date(), TM=NOW.getMonth()+1, NM=TM===12?1:TM+1;
const MONTHS=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

function fmt(n,d=0){ if(n==null||isNaN(n))return'0'; return Number(n).toLocaleString('zh-TW',{minimumFractionDigits:d,maximumFractionDigits:d}); }
function fmtD(iso){ try{return new Date(iso).toLocaleDateString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit'});}catch{return iso||'';} }
function pc(v){ return v>0?'pos':v<0?'neg':'zer'; }
function ps(v){ return v>0?'+':''; }
function getPrice(code){ return S.stockInfo[code]?.price||0; }
function getDivMonths(h){ return (h.divMonths&&h.divMonths.length>0)?h.divMonths:(S.stockInfo[h.code]?.divMonths||[]); }
function getLastDiv(code){ return S.stockInfo[code]?.lastDivAmt; }

// Compute avgPrice from lots (weighted average of remaining lots)
function avgPrice(h){ 
  const lots=h.lots||[];
  if(!lots.length) return 0;
  const totalShares=lots.reduce((s,l)=>s+l.shares,0);
  if(!totalShares) return 0;
  return lots.reduce((s,l)=>s+l.shares*l.price,0)/totalShares;
}
function totalShares(h){ return (h.lots||[]).reduce((s,l)=>s+l.shares,0); }

function getDivInMonth(h,month){
  if(!getDivMonths(h).includes(month)) return 0;
  return (getLastDiv(h.code)||0)*totalShares(h);
}
function hasRecordedDivThisMonth(code){
  const key=`${NOW.getFullYear()}-${String(TM).padStart(2,'0')}`;
  return S.divHistory.some(d=>d.code===code&&d.period===key);
}
function mktValue(){ return S.holdings.reduce((s,h)=>s+totalShares(h)*(getPrice(h.code)||avgPrice(h)),0); }
function snap(){
  const v=mktValue(); if(!v)return;
  const today=NOW.toISOString().slice(0,10);
  const i=S.mktSnaps.findIndex(s=>s.date===today);
  if(i>=0) S.mktSnaps[i].value=v; else S.mktSnaps.push({date:today,value:v});
  S.mktSnaps=S.mktSnaps.slice(-90);
}

// ── Navigation ────────────────────────────────────────────────────────────────
function switchTab(t){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+t).classList.add('active');
  document.getElementById('nav-'+t).classList.add('active');
  renderAll();
  if(t==='market') loadUSMarket('mkt-us');
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal(type,code){
  selH=code?S.holdings.find(h=>h.code===code):null;
  if(type==='editDivMonths') tempM=[...(getDivMonths(selH)||[])];
  modal=type;
  document.getElementById('modal-wrap').style.display='block';
  const s=document.getElementById('sheet');
  s.style.animation='none'; s.offsetHeight; s.style.animation='slideUp .28s ease';
  ({addHolding:mAddHolding,addSell:mAddSell,addDiv:mAddDiv,divPrompt:mDivPrompt,editDivMonths:mEditMonths,deleteHolding:mDelHolding,holdingDetail:mHoldingDetail})[type]?.();
}
function closeModal(){ document.getElementById('modal-wrap').style.display='none'; modal=null; selH=null; }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.style.display='block'; setTimeout(()=>t.style.display='none',2500); }

// ── Render orchestrator ───────────────────────────────────────────────────────
function renderAll(){ rDash(); rHoldings(); rDividends(); rLedger(); rSparkline(); }

// ── Dashboard ─────────────────────────────────────────────────────────────────
function rDash(){
  const cost=S.holdings.reduce((s,h)=>s+totalShares(h)*avgPrice(h),0);
  const mkt=mktValue();
  const upnl=mkt-cost;
  const rpnl=S.sells.reduce((s,v)=>s+v.profit,0);
  const divYr=S.holdings.reduce((s,h)=>s+getDivMonths(h).reduce((ss)=>ss+(getLastDiv(h.code)||0)*totalShares(h),0),0);
  const divRecv=S.divHistory.reduce((s,d)=>s+d.total,0);

  document.getElementById('d-mkt').textContent='$'+fmt(mkt);
  document.getElementById('d-cost').textContent='$'+fmt(cost);
  const up=document.getElementById('d-upnl'); up.textContent=ps(upnl)+'$'+fmt(upnl); up.className='mono '+pc(upnl);
  const rp=document.getElementById('d-rpnl'); rp.textContent=ps(rpnl)+'$'+fmt(rpnl); rp.className='mono '+pc(rpnl);
  document.getElementById('d-yr').textContent='$'+fmt(divYr);
  document.getElementById('d-recv').textContent='$'+fmt(divRecv);

  // Notifications
  const notifs=[];
  S.holdings.forEach(h=>{
    const dm=getDivMonths(h);
    if(dm.includes(TM)&&!hasRecordedDivThisMonth(h.code))
      notifs.push(`<div class="alert-card"><div class="row"><div><div style="font-weight:700;color:var(--green)">💰 ${h.name} 本月配息</div><div style="font-size:12px;color:var(--text3);margin-top:2px">${TM}月配息尚未記錄</div></div><button class="btn-sm" style="background:var(--green);color:#fff" onclick="openModal('divPrompt','${h.code}')">記錄</button></div></div>`);
  });
  const noDiv=S.holdings.filter(h=>getDivMonths(h).length===0);
  if(noDiv.length) notifs.push(`<div class="warn-card"><div class="row"><div><div style="font-weight:700;color:var(--yellow)">⚙️ 未設定配息月</div><div style="font-size:12px;color:var(--text3);margin-top:2px">${noDiv.map(h=>h.name).join('、')}</div></div><button class="btn-sm" style="background:var(--yellow);color:#000" onclick="switchTab('holdings')">前往設定</button></div></div>`);
  const noPrice=S.holdings.filter(h=>!S.stockInfo[h.code]?.price);
  if(noPrice.length) notifs.push(`<div class="warn-card"><div class="row"><div><div style="font-weight:700;color:var(--yellow)">📡 股價未更新</div><div style="font-size:12px;color:var(--text3);margin-top:2px">${noPrice.map(h=>h.name).join('、')}</div></div><button class="btn-sm" style="background:var(--yellow);color:#000" onclick="queryAll()">查詢</button></div></div>`);
  document.getElementById('notif-area').innerHTML=notifs.join('');

  // Holdings mini list
  const el=document.getElementById('d-holdings');
  if(!S.holdings.length){el.innerHTML='<div class="empty"><div class="empty-icon">💼</div>尚無持股</div>';return;}
  el.innerHTML=S.holdings.map(h=>{
    const ts=totalShares(h), ap=avgPrice(h);
    const price=getPrice(h.code)||ap;
    const pnl=(price-ap)*ts, pct=ap?(price-ap)/ap*100:0;
    const dm=getDivMonths(h);
    return `<div class="card2" onclick="openModal('holdingDetail','${h.code}')">
      <div class="row"><div><span style="font-weight:700">${h.name}</span> <span class="chip">${h.code}</span></div>
        <div style="text-align:right"><div class="mono ${pc(pnl)}" style="font-weight:700">${ps(pnl)}$${fmt(pnl)}</div><div class="mono ${pc(pnl)}" style="font-size:12px">${ps(pct)}${fmt(pct,2)}%</div></div></div>
      <div style="display:flex;gap:12px;margin-top:7px;font-size:12px;color:var(--text3);flex-wrap:wrap">
        <span>${fmt(ts)} 股</span><span>均價 $${fmt(ap,2)}</span><span>現價 $${fmt(price,2)}</span>
        <span>${dm.length?'配息：'+dm.join('、')+'月':'未設定配息月'}</span>
      </div></div>`;
  }).join('');
}

// ── Holdings page ─────────────────────────────────────────────────────────────

// ── Ledger ────────────────────────────────────────────────────────────────────
// Each entry: { id, type:'buy'|'sell'|'div', ... }
// Buy entries come from individual lots — each lot is a separate deletable entry
function rLedger(){
  const events=[];
  // Buys — one entry per lot
  S.holdings.forEach(h=>{
    (h.lots||[]).forEach(l=>{
      events.push({uid:`lot|${h.code}|${l.id}`,type:'buy',date:l.date,name:h.name,code:h.code,
        desc:`買入 ${fmt(l.shares)} 股 @ $${fmt(l.price,2)}`,
        amount:-(l.shares*l.price), shares:l.shares, price:l.price});
    });
  });
  // Sells
  S.sells.forEach(s=>{
    events.push({uid:`sell|${s.id}`,type:'sell',date:s.date,name:s.name,code:s.code,
      desc:`賣出 ${fmt(s.shares)} 股 @ $${fmt(s.sellPrice,2)}`,
      amount:s.shares*s.sellPrice, profit:s.profit});
  });
  // Dividends
  S.divHistory.forEach(d=>{
    events.push({uid:`div|${d.id}`,type:'div',date:d.date,name:d.name,code:d.code,
      desc:`股息 ${fmt(d.shares)}股 × $${fmt(d.perShare,3)}`,
      amount:d.total});
  });
  events.sort((a,b)=>new Date(b.date)-new Date(a.date));

  const totalIn=events.filter(e=>e.amount>0).reduce((s,e)=>s+e.amount,0);
  const totalOut=events.filter(e=>e.amount<0).reduce((s,e)=>s+Math.abs(e.amount),0);
  const net=totalIn-totalOut;
  document.getElementById('ledger-sum').innerHTML=`<div class="grid3">
    <div class="card" style="margin-bottom:0;text-align:center"><div class="sl">總流入</div><div class="sv mono" style="color:var(--green)">+$${fmt(totalIn)}</div></div>
    <div class="card" style="margin-bottom:0;text-align:center"><div class="sl">總流出</div><div class="sv mono" style="color:var(--red)">-$${fmt(totalOut)}</div></div>
    <div class="card" style="margin-bottom:0;text-align:center"><div class="sl">淨額</div><div class="sv mono ${pc(net)}">${ps(net)}$${fmt(net)}</div></div>
  </div>`;

  const el=document.getElementById('ledger-list');
  if(!events.length){el.innerHTML='<div class="empty"><div class="empty-icon">📒</div>尚無紀錄</div>';return;}
  const ico={buy:'🔵',sell:'🔴',div:'💚'};
  const lbl={buy:'買入',sell:'賣出',div:'股息'};
  el.innerHTML=events.map(e=>`<div class="card2"><div class="row">
    <div style="display:flex;align-items:center;gap:8px;min-width:0">
      <span style="font-size:18px;flex-shrink:0">${ico[e.type]}</span>
      <div style="min-width:0">
        <div style="font-weight:700;font-size:14px">${e.name} <span style="font-size:11px;color:var(--text3);font-weight:400">${lbl[e.type]}</span></div>
        <div style="font-size:12px;color:var(--text3)">${e.desc}</div>
        <div style="font-size:11px;color:var(--text4)">${fmtD(e.date)}</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:2px;flex-shrink:0">
      <div style="text-align:right">
        <div class="mono" style="font-weight:700;color:${e.amount>=0?'var(--green)':'var(--red)'}">${e.amount>=0?'+':''}$${fmt(Math.abs(e.amount))}</div>
        ${e.profit!=null?`<div class="mono" style="font-size:11px;color:${e.profit>=0?'var(--green)':'var(--red)'}">${ps(e.profit)}$${fmt(e.profit)}</div>`:''}
      </div>
      <button onclick="delLedger('${e.uid}')" style="background:none;border:none;color:var(--text4);font-size:24px;padding:2px 8px;line-height:1;flex-shrink:0">×</button>
    </div>
  </div></div>`).join('');
}

function delLedger(uid){
  const [type,a,b]=uid.split('|');
  if(type==='sell'){
    const id=parseInt(a);
    S.sells=S.sells.filter(s=>s.id!==id);
  } else if(type==='div'){
    const id=parseInt(a);
    S.divHistory=S.divHistory.filter(d=>d.id!==id);
  } else if(type==='lot'){
    const code=a, lotId=parseInt(b);
    const h=S.holdings.find(hh=>hh.code===code);
    if(!h) return;
    const newLots=h.lots.filter(l=>l.id!==lotId);
    if(!newLots.length){
      S.holdings=S.holdings.filter(hh=>hh.code!==code);
    } else {
      S.holdings=S.holdings.map(hh=>hh.code===code?{...hh,lots:newLots}:hh);
    }
  }
  save(); renderAll(); toast('已刪除');
}

// ── Sparkline ─────────────────────────────────────────────────────────────────
function rSparkline(){
  const snaps=S.mktSnaps;
  const canvas=document.getElementById('sparkline');
  const empty=document.getElementById('spark-empty');
  if(!canvas) return;
  if(snaps.length<2){ canvas.style.display='none'; empty.style.display='block'; return; }
  canvas.style.display='block'; empty.style.display='none';
  const W=canvas.offsetWidth||300, H=110;
  canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);
  const vals=snaps.map(s=>s.value);
  const mn=Math.min(...vals)*0.995, mx=Math.max(...vals)*1.005, range=mx-mn||1;
  const pts=snaps.map((s,i)=>({x:i/(snaps.length-1)*W,y:H-(s.value-mn)/range*(H-28)-14}));
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'rgba(10,132,255,0.4)'); grad.addColorStop(1,'rgba(10,132,255,0)');
  ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y); pts.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath(); ctx.fillStyle=grad; ctx.fill();
  ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y); pts.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.strokeStyle='#0a84ff'; ctx.lineWidth=2; ctx.stroke();
  // Labels
  const pct=((vals[vals.length-1]-vals[0])/vals[0]*100);
  ctx.fillStyle=pct>=0?'#30d158':'#ff453a'; ctx.font='bold 15px sans-serif'; ctx.textAlign='center';
  ctx.fillText((pct>=0?'+':'')+fmt(pct,2)+'%', W/2, 14);
  ctx.fillStyle='#8e8e93'; ctx.font='11px sans-serif';
  ctx.fillText('$'+fmt(vals[vals.length-1]), W/2, 28);
  ctx.textAlign='left'; ctx.fillText(snaps[0].date.slice(5),4,H-3);
  ctx.textAlign='right'; ctx.fillText(snaps[snaps.length-1].date.slice(5),W-4,H-3);
}

// ── US Market fetch ───────────────────────────────────────────────────────────
async function loadUSMarket(targetId){
  const el=document.getElementById(targetId);
  if(!el) return;
  if(targetId==='mkt-us'){
    const btn=document.getElementById('mkt-btn');
    if(btn){btn.disabled=true;btn.textContent='載入中...';}
  }
  el.innerHTML=`<div style="text-align:center;padding:16px;color:var(--text3)"><span class="spin">⟳</span></div>`;
  const indices=[{sym:'^DJI',name:'DJIA 道瓊'},{sym:'^GSPC',name:'S&P 500'},{sym:'^IXIC',name:'NASDAQ'}];
  const results=[];
  for(const idx of indices){
    try{
      const url='https://query1.finance.yahoo.com/v8/finance/chart/'+encodeURIComponent(idx.sym)+'?interval=1d&range=2d';
      const r=await fetch('https://api.allorigins.win/get?url='+encodeURIComponent(url));
      const outer=await r.json();
      const meta=JSON.parse(outer.contents)?.chart?.result?.[0]?.meta;
      if(meta){
        const price=meta.regularMarketPrice;
        const prev=meta.chartPreviousClose||meta.previousClose||price;
        const chg=price-prev, pct=prev?chg/prev*100:0;
        results.push({name:idx.name,price,chg,pct});
      }
    }catch{}
  }
  el.innerHTML=results.length?
    results.map(r=>`<div class="card2"><div class="row"><div style="font-weight:700">${r.name}</div><div style="text-align:right"><div class="mono" style="font-weight:800;font-size:17px">${fmt(r.price,2)}</div><div class="mono ${pc(r.chg)}" style="font-size:13px">${ps(r.chg)}${fmt(r.chg,2)} (${ps(r.pct)}${fmt(r.pct,2)}%)</div></div></div></div>`).join(''):
    `<div style="text-align:center;padding:16px;color:var(--text4)">載入失敗，請重試</div>`;
  if(targetId==='mkt-us'){
    const btn=document.getElementById('mkt-btn');
    if(btn){btn.disabled=false;btn.textContent='重新整理';}
  }
  return results;
}

// ── Main query (TW stocks + US indices simultaneously) ────────────────────────
async function queryAll(){
  if(!S.holdings.length){toast('請先新增持股');return;}
  const btn=document.getElementById('ai-btn');
  const msg=document.getElementById('ai-msg');
  btn.disabled=true; btn.innerHTML='<span class="spin">⟳</span>'; msg.textContent='查詢中...';

  // Launch US indices fetch in parallel (don't await yet)
  const usPromise=loadUSMarket('us-data');

  let priceOk=0, divOk=0;
  const updAt=new Date().toISOString();

  for(const h of S.holdings){
    const code=h.code.trim();
    let meta=null, sym='';
    for(const suf of['.TW','.TWO']){
      try{
        const url=`https://query1.finance.yahoo.com/v8/finance/chart/${code}${suf}?interval=1d&range=5d`;
        const r=await fetch('https://api.allorigins.win/get?url='+encodeURIComponent(url));
        const data=JSON.parse((await r.json()).contents);
        const m=data?.chart?.result?.[0]?.meta;
        if(m?.regularMarketPrice){meta=m;sym=code+suf;break;}
      }catch{}
    }
    if(meta){
      const price=Math.round(meta.regularMarketPrice*100)/100;
      const name=meta.shortName||meta.longName||code;
      if(!S.stockInfo[code]) S.stockInfo[code]={};
      S.stockInfo[code]={...S.stockInfo[code],name,price,updAt};
      S.holdings=S.holdings.map(hh=>hh.code===code?{...hh,name}:hh);
      priceOk++;
      // Fetch dividend history
      try{
        const du=`https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=3mo&range=2y&events=dividends`;
        const dr=await fetch('https://api.allorigins.win/get?url='+encodeURIComponent(du));
        const evts=JSON.parse((await dr.json()).contents)?.chart?.result?.[0]?.events?.dividends;
        if(evts){
          const months=[...new Set(Object.values(evts).map(e=>new Date(e.date*1000).getMonth()+1))].sort((a,b)=>a-b);
          if(months.length){
            S.stockInfo[code].divMonths=months;
            const sorted=Object.values(evts).sort((a,b)=>b.date-a.date);
            if(sorted.length) S.stockInfo[code].lastDivAmt=Math.round(sorted[0].amount*1000)/1000;
            S.holdings=S.holdings.map(hh=>{
              if(hh.code!==code||hh._manual) return hh;
              return{...hh,divMonths:months};
            });
            divOk++;
          }
        }
      }catch{}
    }
  }

  // Wait for US data and show inline
  const usResults=await usPromise;
  const usEl=document.getElementById('us-inline');
  if(usResults?.length){
    usEl.style.display='block';
  }

  snap(); save(); renderAll();

  if(priceOk>0){
    msg.textContent=`✓ 股價 ${priceOk} 支${divOk?'，配息月 '+divOk+' 支':''} · ${new Date().toLocaleTimeString('zh-TW')}`;
    const upEl=document.getElementById('ai-updated');
    upEl.style.display='block';
    upEl.textContent=divOk<S.holdings.length?'部分股票無配息資料，可手動設定配息月':'配息月已自動更新';
    toast('✓ 查詢完成');
  } else {
    msg.textContent='⚠ 查詢失敗，請確認網路後重試';
    toast('查詢失敗');
  }
  btn.disabled=false; btn.textContent='查詢';
}

// ── Actions ───────────────────────────────────────────────────────────────────
function doAddHolding(){
  const codeEl=document.getElementById('f-code');
  const code=(codeEl?codeEl.value:selH?.code)?.trim().toUpperCase();
  const shares=parseFloat(document.getElementById('f-shares').value);
  const price=parseFloat(document.getElementById('f-price').value);
  if(!code||isNaN(shares)||isNaN(price)||shares<=0||price<=0){toast('請填寫所有欄位');return;}
  const lot={id:Date.now(),shares,price,date:new Date().toISOString()};
  const existing=S.holdings.find(h=>h.code===code);
  if(existing){
    S.holdings=S.holdings.map(h=>h.code===code?{...h,lots:[...(h.lots||[]),lot]}:h);
  } else {
    const name=S.stockInfo[code]?.name||code;
    S.holdings.push({code,name,lots:[lot],divMonths:[]});
  }
  save();closeModal();renderAll();toast('✓ 新增完成');
}

function doSell(){
  const h=selH;
  const shares=parseFloat(document.getElementById('f-sell-sh').value);
  const sellPrice=parseFloat(document.getElementById('f-sell-pr').value);
  const ts=totalShares(h);
  if(isNaN(shares)||isNaN(sellPrice)||shares<=0||shares>ts){toast('請檢查輸入值');return;}
  // FIFO: consume lots from oldest first
  const ap=avgPrice(h); // weighted avg of all current lots
  const profit=(sellPrice-ap)*shares;
  // Remove shares from lots (FIFO)
  let remaining=shares;
  let newLots=[...(h.lots||[])].sort((a,b)=>new Date(a.date)-new Date(b.date));
  const consumed=[];
  for(let i=0;i<newLots.length&&remaining>0;i++){
    const take=Math.min(newLots[i].shares,remaining);
    consumed.push({shares:take,price:newLots[i].price});
    newLots[i]={...newLots[i],shares:newLots[i].shares-take};
    remaining-=take;
  }
  newLots=newLots.filter(l=>l.shares>0);
  S.sells.unshift({id:Date.now(),code:h.code,name:h.name,shares,sellPrice,avgCost:ap,profit,date:new Date().toISOString()});
  if(!newLots.length) S.holdings=S.holdings.filter(hh=>hh.code!==h.code);
  else S.holdings=S.holdings.map(hh=>hh.code===h.code?{...hh,lots:newLots}:hh);
  save();closeModal();renderAll();toast('✓ 賣出完成');
}

function doDiv(){
  const h=selH;
  const raw=document.getElementById('f-div-per').value;
  const perShare=parseFloat(raw);
  const date=document.getElementById('f-div-date').value;
  if(raw===''||isNaN(perShare)||perShare<0){toast('請輸入每股股息（可填 0）');return;}
  const ts=totalShares(h);
  const period=`${NOW.getFullYear()}-${String(TM).padStart(2,'0')}`;
  S.divHistory.unshift({id:Date.now(),code:h.code,name:h.name,perShare,shares:ts,total:perShare*ts,date,period});
  if(!S.stockInfo[h.code]) S.stockInfo[h.code]={};
  S.stockInfo[h.code].lastDivAmt=perShare;
  save();closeModal();renderAll();toast('✓ 股息記錄完成');
}

function doDelHolding(code){ S.holdings=S.holdings.filter(h=>h.code!==code); save();closeModal();renderAll();toast('已刪除'); }
function delDivHistory(id){ S.divHistory=S.divHistory.filter(d=>d.id!==id); save();renderAll(); }
